# momofuku v2形式の冒頭90秒テスト（フック+1957）。承認されたら全編をこの形式で作り直す。
# v1からの変更: 超短文ラリー(中央値10字)・間0.15s・立ち絵1.42倍+演技(跳ね/ジャンプ/震え)・
# イラスト背景・SE・吹き出しは話者色フチ
meta:
  title: "全財産を失った48歳、裏庭の小屋で世界を変える【ゆっくり再現ドラマ】"
  slug: "momofuku-v2"
  summary: "v2形式テスト"
  mode: drama
  narrator: reimu
  mobs:
    - {id: saikensha, label: "債権者", voice: 13, pitch: -0.05, hair: short}
    - {id: yujin, label: "知人", voice: 13, pitch: 0.03}
scenes:
  # ================= フック（現代・夜のキッチン） =================
  - id: hook
    title: ""
    background: il_kitchen_night
    bgm: shuffle_shuffle
    stage:
      - {who: zundamon, x: 0.30, flip: true}
      - {who: tsumugi, x: 0.74}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "今日も自炊をするのだ！"
      - speaker: zundamon
        emotion: happy
        text: "今日はとんこつラーメンなのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "昨日も味噌ラーメンだったじゃない。"
      - speaker: tsumugi
        emotion: normal
        text: "ていうか、お湯を注いだだけでしょ。"
      - speaker: zundamon
        emotion: angry
        text: "む！カップ麺は立派な料理なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "カップ麺だけだと健康に悪いよ。"
      - speaker: zundamon
        emotion: happy
        text: "……でもうまいのだ。"
      - speaker: zundamon
        emotion: happy
        text: "毎日ラーメン健康生活なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "何か違うものも食べなよ。体壊しちゃうよ。"
      - speaker: zundamon
        emotion: normal
        text: "わかったのだ。"
      - speaker: zundamon
        emotion: happy
        text: "今日は奮発して、カレーにするのだ！"
      - speaker: tsumugi
        emotion: thinking
        text: "……それもインスタントじゃない。"
        pause_after: 0.4
      - speaker: reimu
        text: "インスタントラーメン、世界で年間1000億食。"
      - speaker: reimu
        text: "地球の全員が、年12回食べる計算です。"
      - speaker: reimu
        text: "作ったのは、全財産を失った安藤[百福|ももふく]という、47歳の男でした。"
        telops:
          - {text: "全財産を失った47歳", size: xl, position: middle-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
      - speaker: zundamon
        emotion: surprised
        text: "話が重いのだ！？"
        pause_after: 0.4
  # ================= 1957 年号カード =================
  - id: y1957
    title: "1957・すべてを失う"
    background: il_washitsu_1957
    bgm: serious
    stage:
      - {who: zundamon, x: 0.15, tag: "百福", flip: true}
    cuts:
      - speaker: reimu
        text: "1957年、大阪。"
        video: assets/clips/era_m1957.mp4
        video_full: true
      - speaker: reimu
        text: "[百福|ももふく]は、いくつもの事業を当てた実業家でした。"
      - speaker: zundamon
        emotion: happy
        text: "事業は絶好調なのだ！"
  # ================= 転落の始まり（頼まれごと） =================
  - id: y1957friend
    title: ""
    background: il_washitsu_1957
    stage:
      - {who: zundamon, x: 0.24, tag: "百福", flip: true}
      - {who: yujin, x: 0.60}
    cuts:
      - speaker: yujin
        text: "[百福|ももふく]さん、頼みがある。"
      - speaker: yujin
        text: "うちの信用組合の理事長を、やってくれないか。"
      - speaker: zundamon
        emotion: thinking
        text: "金融は素人なのだ……。"
      - speaker: yujin
        text: "名前だけでいいんだ。頼むよ。"
      - speaker: zundamon
        emotion: normal
        text: "それなら、いいのだ。"
      - speaker: reimu
        text: "この軽い返事が、人生を変えます。"
        pause_after: 0.6
      - speaker: reimu
        text: "数年後、組合は破綻。"
      - speaker: reimu
        text: "理事長の[百福|ももふく]に、全責任がのしかかりました。"
        pause_after: 0.4
  # ================= 1957 破綻 =================
  - id: y1957b
    title: ""
    background: il_washitsu_1957
    stage:
      - {who: zundamon, x: 0.18, tag: "百福", flip: true}
      - {who: saikensha, x: 0.52}
      - {who: tsumugi, x: 0.86, tag: "仁子"}
    cuts:
      - speaker: reimu
        text: "そして玄関に、男が立っていました。"
      - speaker: saikensha
        text: "財産は、全部いただきます。"
        se: don
      - speaker: zundamon
        emotion: surprised
        text: "全部なのだ！？"
      - speaker: saikensha
        text: "全部です。"
      - speaker: zundamon
        emotion: surprised
        text: "貯金もなのだ！？"
      - speaker: saikensha
        text: "はい。"
      - speaker: zundamon
        emotion: surprised
        text: "事業もなのだ！？"
      - speaker: saikensha
        text: "はい。"
      - speaker: zundamon
        emotion: surprised
        text: "家もなのだ！？"
      - speaker: saikensha
        text: "……お住まいは残ります。"
      - speaker: zundamon
        emotion: happy
        text: "やったのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "喜ぶところじゃないよ。"
      - speaker: reimu
        text: "47歳、無一文。"
        pause_after: 0.4
      - speaker: zundamon
        emotion: sad
        text: "現代語で言うと、詰みなのだ……。"
        se: oti
        pause_after: 0.5
  # 債権者は退場して夫婦の場面に
  - id: y1957c
    title: ""
    background: il_washitsu_1957
    stage:
      - {who: zundamon, x: 0.24, tag: "百福", flip: true}
      - {who: tsumugi, x: 0.76, tag: "仁子"}
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "あなた。"
      - speaker: tsumugi
        emotion: normal
        text: "命までは、取られてないよ。"
      - speaker: tsumugi
        emotion: happy
        text: "ごはんにしよ。"
      - speaker: zundamon
        emotion: happy
        text: "食べるのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "今日はお粥だけどね。"
      - speaker: zundamon
        emotion: sad
        text: "具が、ないのだ……。"
      - speaker: tsumugi
        emotion: normal
        text: "明日は梅干しをのせてあげる。"
      - speaker: zundamon
        emotion: happy
        text: "明日が楽しみなのだ！"
      - speaker: reimu
        text: "この楽観夫婦が、世界を変えます。"
        pause_after: 0.6
