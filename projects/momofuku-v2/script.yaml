        reading: "このふゆをさかいに、かっぷぬーどるはにちじょうになりました。"
      - speaker: zundamon
        emotion: surprised
        text: "作っても作っても、追いつかないのだ！"
        pause_after: 0.6
  # ================= 世界へ =================
  - id: sekai
    title: ""
    background: il_america
    bgm: you_and_me
    stage:
      - {who: zundamon, x: 0.24, tag: "百福", flip: true}
      - {who: tsumugi, x: 0.78, tag: "仁子"}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "今度こそ、海を渡るぞ！"
      - speaker: zundamon
        emotion: normal
        text: "所変われば、スープの味も変わるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "国ごとに、味を変えていったんだね。"
      - speaker: zundamon
        emotion: normal
        text: "[辛い|からい]国にはもっと辛く、酸っぱい国には酸っぱくなのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "[郷|ごう]に入っては、[郷|ごう]の味だね。"
      - speaker: reimu
        text: "世界で年間1000億食。冒頭の数字は、こうして生まれたのです。"
        reading: "せかいで、ねんかんせんおくしょく。ぼうとうのすうじは、こうしてうまれたのです。"
      - speaker: zundamon
        emotion: happy
        text: "ボクの夜食は、世界の夜食だったのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "あなたのは食べすぎだけどね。"
        pause_after: 0.5
  # ================= 現代・多様化 =================
  - id: gendai_tana
    title: "そして現代へ"
    background: il_conbini
    bgm: pastel_house
    stage:
      - {who: zundamon, x: 0.26, flip: true}
      - {who: tsumugi, x: 0.76}
    cuts:
      - speaker: reimu
        text: "時は流れて、現代。"
        reading: "ときはながれて、げんだい。"
      - speaker: zundamon
        emotion: surprised
        text: "棚が、カップだらけなのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "しかも麺だけじゃないんだよね。"
      - speaker: zundamon
        emotion: thinking
        text: "種類が多すぎて、選べないのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "その悩み、昭和にはなかったんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "2013年には、カップのカレーライスが出て。"
        video: assets/clips/mf2_gohan.mp4
        video_span: 4
        video_full: true
      - speaker: tsumugi
        emotion: happy
        text: "次の年にカレーメシって名前になって、大ヒット。"
      - speaker: zundamon
        emotion: surprised
        text: "カレーまで、お湯でできる時代なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "あなたが夜食にしてたやつね。"
      - speaker: zundamon
        emotion: happy
        text: "ボクは時代の最先端だったのだ！"
      - speaker: tsumugi
        emotion: thinking
        text: "ただの偏食だよ。"
      - speaker: tsumugi
        emotion: happy
        text: "ご飯もカレーも、お湯だけの仲間入りだね。"
  - id: gendai_kenko
    title: ""
    background: il_conbini
    stage:
      - {who: zundamon, x: 0.26, flip: true}
      - {who: tsumugi, x: 0.76}
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "それでね、最近の流行りは健康なんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "2021年には、高たんぱくで低糖質のカップヌードル。"
        video: assets/clips/mf2_kenko.mp4
        video_span: 4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "2022年には、栄養バランス全部入りの完全メシ。"
      - speaker: zundamon
        emotion: happy
        text: "毎日ラーメン健康生活が、公式になったのだ！"
      - speaker: tsumugi
        emotion: thinking
        text: "発想が逆なんだよなあ。"
      - speaker: zundamon
        emotion: happy
        text: "時代がボクに追いついたのだ！"
      - speaker: zundamon
        emotion: thinking
        text: "で、健康なやつは味はどうなのだ？"
      - speaker: tsumugi
        emotion: happy
        text: "それが、ちゃんとおいしいんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "おいしくて、体にいい。昔なら夢の話だね。"
      - speaker: reimu
        text: "小屋の5つの目標は、今も更新され続けています。"
        reading: "こやのいつつのもくひょうは、いまもこうしんされつづけています。"
      - speaker: zundamon
        emotion: thinking
        text: "次は、何が出るのだ？"
      - speaker: tsumugi
        emotion: happy
        text: "それは、誰かがこれから発明するんだよ。"
        pause_after: 0.5
  # ================= 晩年 =================
  - id: bannen
    title: "止まらない人"
    background: il_uchu
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.26, tag: "百福", flip: true}
      - {who: tsumugi, x: 0.76, tag: "仁子"}
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "90歳を過ぎても、まだ会社に行くの？"
      - speaker: zundamon
        emotion: normal
        text: "まだ、やりたいことがあるのだ。"
      - speaker: reimu
        text: "2005年。宇宙食のラーメンを完成させます。"
        reading: "にせんごねん。うちゅうしょくのらーめんを、かんせいさせます。"
        video: assets/clips/astronaut.mp4
        video_span: 3
        video_full: true
        video_speed: 0.8
      - speaker: reimu
        text: "95歳でした。"
        reading: "きゅうじゅうごさいでした。"
      - speaker: zundamon
        emotion: surprised
        text: "95歳で宇宙なのだ！？"
      - speaker: zundamon
        emotion: thinking
        text: "無重力で、スープが飛んだら大事故なのだ。"
      - speaker: zundamon
        emotion: normal
        text: "麺は丸めて、一口で食べられる塊にするのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "90歳を過ぎて、まだ発明してる。"
      - speaker: reimu
        text: "麺は一口サイズ。スープにはとろみ。無重力への対策です。"
        reading: "めんはひとくちさいず。すーぷにはとろみ。むじゅうりょくへのたいさくです。"
      - speaker: zundamon
        emotion: happy
        text: "小屋の麺が、ついに地球を出たのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "今日も朝からゴルフ？"
      - speaker: zundamon
        emotion: happy
        text: "体が資本なのだ。"
      - speaker: reimu
        text: "日課はゴルフと、チキンラーメンだったと言われています。"
        reading: "にっかはごるふと、ちきんらーめんだったといわれています。"
      - speaker: tsumugi
        emotion: normal
        text: "今日のお昼も、チキンラーメンでいいの？"
      - speaker: zundamon
        emotion: happy
        text: "もちろんなのだ。発明した本人が、一番のファンなのだ。"
      - speaker: reimu
        text: "昼食はほぼ毎日チキンラーメン。生涯続いたそうです。"
        reading: "ちゅうしょくは、ほぼまいにちちきんらーめん。しょうがいつづいたそうです。"
      - speaker: tsumugi
        emotion: normal
        text: "思えば、2回もゼロになったね。"
      - speaker: zundamon
        emotion: normal
        text: "3回目が来ても、平気なのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "どうして？"
      - speaker: zundamon
        emotion: happy
        text: "ゼロから始める楽しさを、もう知ってるのだ。"
        pause_after: 0.6
      - speaker: reimu
        text: "2007年1月。96歳で、その生涯を閉じました。"
        reading: "にせんななねん、いちがつ。きゅうじゅうろくさいで、そのしょうがいをとじました。"
        pause_after: 0.8
      - speaker: tsumugi
        emotion: sad
        text: "最後まで、麺と一緒の人生だったね。"
        pause_after: 0.5
      - speaker: reimu
        text: "人生に遅すぎるということはない。"
        reading: "じんせいに、おそすぎるということはない。"
        telops:
          - {text: "人生に遅すぎるということはない", size: lg, position: middle-center, color: "#FFFFFF", stroke: "#1E222E", anim: fade}
      - speaker: reimu
        text: "そう語り続けた人でした。"
        reading: "そうかたりつづけたひとでした。"
        pause_after: 0.8
  # ================= 現代へ戻る =================
  - id: gendai
    title: ""
    background: il_kitchen_night
    bgm: pastel_house
    stage:
      - {who: zundamon, x: 0.15, flip: true}
      - {who: tsumugi, x: 0.86}
    cuts:
      - speaker: zundamon
        emotion: thinking
        text: "今日は[何味|なにあじ]にするか……よし、しょうゆなのだ。"
      - speaker: zundamon
        emotion: normal
        text: "お湯を注いだのだ。今日は、ちゃんと3分待つのだ。"
        video: assets/clips/mf2_timer3.mp4
        video_span: 3
        video_full: true
      - speaker: zundamon
        emotion: thinking
        text: "この3分に、96年の人生が詰まってるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "待った分だけ、おいしいよ。"
      - speaker: zundamon
        emotion: happy
        text: "3分経ったのだ！いただきますなのだ！"
        video: assets/clips/noodle_eat.mp4
        video_span: 2
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "おいしい？"
      - speaker: zundamon
        emotion: happy
        text: "立派な料理なのだ！"
      - speaker: tsumugi
        emotion: happy
        text: "……今日はそういうことにしてあげる。"
      - speaker: zundamon
        emotion: happy
        text: "明日はカレーメシなのだ！"
      - speaker: tsumugi
        emotion: thinking
        text: "それもインスタントじゃない。"
        pause_after: 0.4
      - speaker: zundamon
        emotion: happy
        text: "何かを始めるのに、遅すぎることはないのだ！"
      - speaker: tsumugi
        emotion: happy
        text: "この動画が面白かったら、高評価とチャンネル登録をお願いします。"
      - speaker: zundamon
        emotion: happy
        duet_with: tsumugi
        text: "ご視聴、ありがとうございました！"
