# 百福再現ドラマ完全版（誕生1910→没2007＋現代）。投稿前に必ず目視レビュー。
# 裏取り済み: 1910/3/5嘉義生まれ・本名呉百福・幼少期に両親死別/祖父は布問屋・20歳頃図書館司書2年・
# 1932台北「東洋莫大小」22歳(父の遺産・祖父と競合しないメリヤス)・1933大阪日東商会・
# 立命館専門部経済(二部)1934修了・戦中は軍用機部品工場/憲兵に無実の罪で45日拘束・
# 戦後は製塩/栄養食品・1948中交総社(のち日清食品)・1948GHQ脱税嫌疑で収監/財産没収・
# 1957信用組合(大阪華銀)破綻で全財産喪失(通説はヘッジ・無実とは断言しない)・
# 1958/8/25チキンラーメン35円(うどん玉6円)・翌年1300万食(ヘッジ)・1961-64特許を業界へ開放・
# 1966渡米紙コップ+機内アルミ蓋・1971/9/18カップヌードル100円(袋麺25円)・銀座4時間2万食(ヘッジ)・
# 1972/2雪の中継・2013カップカレーライス→2014カレーメシ・2021カップヌードルPRO高たんぱく低糖質・
# 2022完全メシ・2005宇宙食(95歳)・2007/1没96歳・昼食はほぼ毎日チキンラーメン
# 声: ナレーター=ゆっくり中性(AquesTalkPlayer)・百福=ずんだもん・仁子=つむぎ・モブ=白キャラ
meta:
  title: "全財産を失った47歳、裏庭の小屋で世界を変える【ゆっくり再現ドラマ】"
  slug: "momofuku-v2"
  summary: "カップ麺を発明した男、安藤百福の96年。台湾の布問屋で育った少年が、22歳で起業し、戦争と収監で二度すべてを失い、47歳で裏庭の小屋にこもるまで。チキンラーメン誕生からカップヌードル、95歳の宇宙食まで、ずんだもんが百福を演じる再現ドラマでお届けします。"
  tags: ["安藤百福", "カップヌードル", "チキンラーメン", "再現ドラマ", "ゆっくり", "ずんだもん", "伝記"]
  thumbnail:
    top: "全財産を失った47歳"
    bottom: "逆転の3分"
  mode: drama
  narrator: reimu
  mobs:
    - {id: saikensha, label: "債権者", voice: 13, pitch: -0.05, hair: short}
    - {id: yujin, label: "知人", voice: 13, pitch: 0.03}
    - {id: sofu, label: "祖父", voice: 42, item: mustache}
    - {id: kenpei, label: "憲兵", voice: 13, pitch: -0.12, item: hat}
    - {id: ghq, label: "GHQ", voice: 13, pitch: -0.07, item: hat}
    - {id: wakamono, label: "若者", voice: 12, hair: short}
    - {id: okusan, label: "奥さん", voice: 8, pitch: 0.06, hair: bun}
    - {id: kyaku, label: "客", voice: 8, pitch: 0.02, hair: bun}
    - {id: tonya, label: "問屋", voice: 13, pitch: -0.08, item: mustache}
    - {id: buyer, label: "バイヤー", voice: 13, pitch: -0.02, item: hat}
    - {id: taiin, label: "隊員", voice: 13, pitch: -0.10, hair: short}
    - {id: shain, label: "社員", voice: 13, pitch: 0.05, hair: short}
    - {id: isha, label: "医者", voice: 13, pitch: -0.03, hair: short}
scenes:
  # ================= フック茶番（現代・夜のキッチン／承認済み） =================
  - id: hook
    title: ""
    background: il_kitchen_night
    bgm: shuffle_shuffle
    stage:
      - {who: zundamon, x: 0.30, flip: true}
      - {who: tsumugi, x: 0.74}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "今日も自炊をするのだ！"
      - speaker: zundamon
        emotion: happy
        text: "今日はとんこつラーメンなのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "昨日も味噌ラーメンだったじゃない。"
      - speaker: tsumugi
        emotion: normal
        text: "ていうか、お湯を注いだだけでしょ。"
      - speaker: zundamon
        emotion: angry
        text: "む！カップ麺は立派な料理なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "カップ麺だけだと健康に悪いよ。"
      - speaker: zundamon
        emotion: happy
        text: "……でもうまいのだ。"
      - speaker: zundamon
        emotion: happy
        text: "毎日ラーメン健康生活なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "何か違うものも食べなよ。体壊しちゃうよ。"
      - speaker: zundamon
        emotion: normal
        text: "わかったのだ。"
      - speaker: zundamon
        emotion: happy
        text: "今日は奮発して、カレーにするのだ！"
      - speaker: tsumugi
        emotion: thinking
        text: "……それもインスタントじゃない。"
        pause_after: 0.4
      - speaker: reimu
        text: "インスタントラーメン、世界で年間1000億食。"
        reading: "いんすたんとらーめん、せかいでねんかんせんおくしょく。"
      - speaker: reimu
        text: "地球の全員が、[年|ねん]12回食べる計算です。"
        reading: "ちきゅうのぜんいんが、ねんじゅうにかいたべるけいさんです。"
      - speaker: reimu
        text: "作ったのは、全財産を失った安藤[百福|ももふく]という、47歳の男でした。"
        reading: "つくったのは、ぜんざいさんをうしなったあんどうももふくという、よんじゅうななさいのおとこでした。"
        telops:
          - {text: "全財産を失った47歳", size: xl, position: middle-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
      - speaker: zundamon
        emotion: surprised
        text: "話が重いのだ！？"
        pause_after: 0.4
      - speaker: reimu
        text: "物語は、1910年の台湾から始まります。"
        reading: "ものがたりは、せんきゅうひゃくじゅうねんのたいわんからはじまります。"
        pause_after: 0.5
  # ================= 1910 誕生 =================
  - id: y1910
    title: "1910・布問屋の孫"
    background: il_nunoya
    bgm: 223am
    stage: []
    cuts:
      - speaker: reimu
        text: "1910年。日本統治時代の台湾、[嘉義|かぎ]。"
        reading: "せんきゅうひゃくじゅうねん。にほんとうちじだいのたいわん、かぎ。"
        video: assets/clips/era_v1910.mp4
        video_full: true
      - speaker: reimu
        text: "のちの安藤[百福|ももふく]、[呉百福|ごひゃくふく]が生まれました。"
        reading: "のちのあんどうももふく、ごひゃくふくがうまれました。"
      - speaker: reimu
        text: "幼くして両親を亡くし、[布問屋|ぬのどんや]の祖父母に育てられます。"
        reading: "おさなくしてりょうしんをなくし、ぬのどんやのそふぼにそだてられます。"
        pause_after: 0.5
  # ================= 幼少期・店番 =================
  - id: y1910b
    title: ""
    background: il_nunoya
    bgm: honwaka_puppu
    stage:
      - {who: zundamon, x: 0.20, tag: "百福", flip: true, scale: 0.75}
      - {who: kyaku, x: 0.52}
      - {who: sofu, x: 0.82}
    cuts:
      - speaker: sofu
        text: "[百福|ももふく]、店番を頼むよ。"
      - speaker: zundamon
        emotion: happy
        text: "任せろなのだ！"
      - speaker: sofu
        text: "挨拶は元気よく、だ。"
      - speaker: zundamon
        emotion: happy
        text: "いらっしゃいなのだ！"
      - speaker: kyaku
        text: "この反物、もう少しまからないの？"
      - speaker: sofu
        text: "これは引けませんな。"
      - speaker: kyaku
        text: "じゃあ、こっちの色違いなら？"
      - speaker: sofu
        text: "それなら、少し勉強しましょう。"
      - speaker: zundamon
        emotion: thinking
        text: "引くところと、引かないところがあるのだ……。"
      - speaker: sofu
        text: "全部まけたら店が潰れる。全部断ったら客が消える。"
      - speaker: zundamon
        emotion: surprised
        text: "商売は、綱渡りなのだ！"
      - speaker: kyaku
        text: "この子、そろばんが早いのねえ。"
      - speaker: zundamon
        emotion: happy
        text: "毎晩、店で鍛えてるのだ！"
      - speaker: kyaku
        text: "末は大商人だわ。"
      - speaker: zundamon
        emotion: happy
        text: "目指すぞ！"
      - speaker: sofu
        text: "学校より、店が先生だな。"
      - speaker: zundamon
        emotion: thinking
        text: "反物が1本売れると、いくら儲かるのだ？"
      - speaker: sofu
        text: "ほう。いい質問だ。"
      - speaker: zundamon
        emotion: happy
        text: "じゃあ2本売れば、2倍なのだ！"
      - speaker: sofu
        text: "その意気だ。"
      - speaker: zundamon
        emotion: happy
        text: "今日は全部おまけするのだ！"
      - speaker: sofu
        text: "それは商売じゃない。"
      - speaker: zundamon
        emotion: happy
        text: "夜は、お店の帳簿を眺めるのだ。"
      - speaker: zundamon
        emotion: happy
        text: "今日は昨日より、反物2本ぶん多く売れてるのだ。"
      - speaker: sofu
        text: "……末恐ろしい孫だ。"
  # ================= 図書館司書 =================
  - id: library
    title: ""
    background: il_library
    bgm: jitaku_nite
    stage:
      - {who: zundamon, x: 0.28, tag: "百福", flip: true, scale: 0.9}
    cuts:
      - speaker: reimu
        text: "20歳。町に初めてできた図書館で、司書になります。"
        reading: "はたち。まちにはじめてできたとしょかんで、ししょになります。"
      - speaker: zundamon
        emotion: happy
        text: "本が読み放題なのだ！端の棚から、全部読みつくすぞ！"
      - speaker: zundamon
        emotion: surprised
        text: "世界には、ボクの知らない商売が山ほどあるのだ。"
      - speaker: zundamon
        emotion: happy
        text: "この本には、氷を売って財を成した人が載ってるのだ。"
      - speaker: zundamon
        emotion: thinking
        text: "氷が商売になるなら、なんだって商売になるのだ。"
      - speaker: zundamon
        emotion: normal
        text: "商売の本なんて、係のボクがずっと借りっぱなしなのだ。"
      - speaker: reimu
        text: "それは司書として、どうかと思います。"
        reading: "それはししょとして、どうかとおもいます。"
      - speaker: zundamon
        emotion: normal
        text: "貸出カードが、ボクの名前だらけなのだ。"
      - speaker: zundamon
        emotion: thinking
        text: "読めば読むほど、うずうずしてくるのだ。"
      - speaker: zundamon
        emotion: thinking
        text: "本の中の商売を、ボクはまだひとつもやってない……。"
      - speaker: zundamon
        emotion: normal
        text: "……2年読んで、決めたのだ。"
      - speaker: zundamon
        emotion: happy
        text: "館長、辞表なのだ！"
      - speaker: zundamon
        emotion: normal
        text: "読む側は、卒業なのだ。"
      - speaker: zundamon
        emotion: happy
        text: "誰もやってないことを、やるのだ！"
  # ================= 1932 22歳の起業 =================
  - id: y1932
    title: "1932・22歳の起業"
    background: il_shokai
    bgm: you_and_me
    stage:
      - {who: zundamon, x: 0.15, tag: "百福", flip: true}
    cuts:
      - speaker: reimu
        text: "1932年、台北。"
        reading: "せんきゅうひゃくさんじゅうにねん、たいぺい。"
        video: assets/clips/era_v1932.mp4
        video_full: true
        pause_after: 0.8
      - speaker: zundamon
        emotion: happy
        text: "22歳！父さんの遺産で、勝負に出るのだ！"
  - id: y1932b
    title: ""
    background: il_shokai
    stage:
      - {who: zundamon, x: 0.26, tag: "百福", flip: true}
      - {who: sofu, x: 0.70}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "社名は、[東洋莫大小|とうようめりやす]なのだ！"
      - speaker: sofu
        text: "……読めん。"
      - speaker: zundamon
        emotion: happy
        text: "これで、メリヤスと読むぞ！"
      - speaker: zundamon
        emotion: normal
        text: "読めない名前は、一度で覚えてもらえるのだ。"
      - speaker: sofu
        text: "で、そのメリヤスとは[何|なん]だ。"
      - speaker: zundamon
        emotion: normal
        text: "伸び縮みする編み物の生地で、肌着にぴったりなのだ。"
      - speaker: zundamon
        emotion: happy
        text: "これからは、メリヤスの時代が来るぞ！"
      - speaker: sofu
        text: "仕入れの当てはあるのか。"
      - speaker: zundamon
        emotion: normal
        text: "内地の工場から、直接仕入れるのだ。"
      - speaker: zundamon
        emotion: normal
        text: "間に人を挟まない分、安く売れるのだ。"
      - speaker: sofu
        text: "若いのに、抜け目がないな。"
      - speaker: sofu
        text: "うちの織物と、かぶらないのかい。"
      - speaker: zundamon
        emotion: normal
        text: "編み物は別ジャンルなのだ。"
      - speaker: zundamon
        emotion: happy
        text: "おじいちゃんの客は、取らないのだ。"
      - speaker: sofu
        text: "わしの織物と、かぶらん商売をわざわざ選んだか。"
      - speaker: zundamon
        emotion: normal
        text: "おじいちゃんの客は、取らないのだ。"
      - speaker: sofu
        text: "……立派になったな。"
      - speaker: sofu
        text: "で、売れとるのか。"
      - speaker: zundamon
        emotion: thinking
        text: "開店の日は、眠れなかったのだ……。"
      - speaker: zundamon
        emotion: surprised
        text: "でも朝から、店の前に行列ができたのだ！"
      - speaker: zundamon
        emotion: happy
        text: "メリヤスの肌着が、仕入れた先から売れてるのだ！"
      - speaker: zundamon
        emotion: happy
        text: "22歳、若社長の誕生なのだ！"
      - speaker: sofu
        text: "調子に乗るなよ。"
      - speaker: zundamon
        emotion: happy
        text: "乗るのだ！商売は勢いなのだ！"
      - speaker: reimu
        text: "この勢いが、のちに何度も彼を救います。"
        reading: "このいきおいが、のちになんどもかれをすくいます。"
  # ================= 1933 大阪へ =================
  - id: osaka
    title: ""
    background: il_shokai
    bgm: natsuyasumi
    stage:
      - {who: zundamon, x: 0.26, tag: "百福", flip: true}
      - {who: shain, x: 0.68}
    cuts:
      - speaker: reimu
        text: "翌1933年、海を渡って大阪へ。"
        reading: "よく、せんきゅうひゃくさんじゅうさんねん、うみをわたっておおさかへ。"
      - speaker: zundamon
        emotion: happy
        text: "大阪で、日東商会を旗揚げだ！"
      - speaker: zundamon
        emotion: happy
        text: "商人の街は、話が早いのだ！"
      - speaker: shain
        text: "社長、大阪の問屋さんは値切りがすごいです！"
      - speaker: zundamon
        emotion: happy
        text: "望むところなのだ。"
      - speaker: zundamon
        emotion: normal
        text: "値切られる前に、こっちからまけるのだ。"
      - speaker: shain
        text: "えっ。"
      - speaker: zundamon
        emotion: happy
        text: "その代わり、たくさん買ってもらうのだ。"
      - speaker: shain
        text: "その手があったか……。"
      - speaker: shain
        text: "社長、追加の注文です！"
      - speaker: zundamon
        emotion: happy
        text: "どんどん受けるぞ！"
      - speaker: shain
        text: "社長、在庫が足りません！"
      - speaker: zundamon
        emotion: surprised
        text: "どんどん仕入れるのだ！"
      - speaker: reimu
        text: "昼は、若き社長。"
        reading: "ひるは、わかきしゃちょう。"
  # ================= 夜学 =================
  - id: yagaku
    title: ""
    background: il_yagaku
    bgm: 10do
    stage:
      - {who: zundamon, x: 0.28, tag: "百福", flip: true}
      - {who: wakamono, x: 0.68}
    cuts:
      - speaker: reimu
        text: "そして夜は、学生でした。"
        reading: "そしてよるは、がくせいでした。"
      - speaker: zundamon
        emotion: thinking
        text: "眠い……でも、経済学なのだ……。"
      - speaker: zundamon
        emotion: normal
        text: "[立命館|りつめいかん]の夜間で、経済を学ぶのだ。"
      - speaker: zundamon
        emotion: normal
        text: "商売の勘だけじゃ、いつか負けるのだ。"
      - speaker: wakamono
        text: "なあ、あんた昼間は何してる人だ？"
      - speaker: zundamon
        emotion: thinking
        text: "……しがない、繊維屋なのだ。"
      - speaker: wakamono
        text: "ふーん。いい服着てるけどな。"
      - speaker: zundamon
        emotion: happy
        text: "気のせいなのだ。"
      - speaker: wakamono
        text: "てか、あんたいつ寝てるんだ？"
      - speaker: zundamon
        emotion: normal
        text: "移動中に寝るのだ。"
      - speaker: wakamono
        text: "器用だな……。"
      - speaker: zundamon
        emotion: thinking
        text: "試験前でも、仕入れは待ってくれないのだ……。"
      - speaker: zundamon
        emotion: happy
        text: "2年通って、修了なのだ！働く学士サマなのだ！"
      - speaker: zundamon
        emotion: happy
        text: "23歳、社長で学士サマなのだ！"
      - speaker: reimu
        text: "[順風満帆|じゅんぷうまんぱん]。しかし、時代が変わります。"
        reading: "じゅんぷうまんぱん。しかし、じだいがかわります。"
        pause_after: 0.5
  # ================= 戦中 =================
  - id: senchu
    title: "戦時中・暗転"
    background: il_kojo
    bgm: serious
    stage:
      - {who: zundamon, x: 0.24, tag: "百福", flip: true}
    cuts:
      - speaker: reimu
        text: "戦争の時代。"
        reading: "せんそうのじだい。"
        video: assets/clips/era_v1941.mp4
        video_full: true
        pause_after: 1.8
      - speaker: zundamon
        emotion: sad
        text: "今日から、飛行機の部品を作れ……なのだ。"
      - speaker: zundamon
        emotion: sad
        text: "売りたいのは、肌着なのだ……。"
      - speaker: zundamon
        emotion: normal
        text: "でも、作れと言われれば作るしかないのだ。"
      - speaker: zundamon
        emotion: normal
        text: "部品の検品、今日も山積みなのだ……。"
      - speaker: zundamon
        emotion: normal
        text: "飛行機の部品は、手を抜けば人が死ぬのだ。"
      - speaker: zundamon
        emotion: sad
        text: "早く、好きな商売がしたいのだ……。"
  - id: senchu_b
    title: ""
    background: il_kojo
    stage:
      - {who: zundamon, x: 0.24, tag: "百福", flip: true}
      - {who: kenpei, x: 0.66}
    cuts:
      - speaker: kenpei
        text: "話を聞かせてもらおう。"
      - speaker: zundamon
        emotion: surprised
        text: "ボクが、何をしたのだ？"
      - speaker: kenpei
        text: "工場の物資に、不正があった。"
      - speaker: zundamon
        emotion: angry
        text: "身に覚えがないのだ！"
      - speaker: kenpei
        text: "それはこちらが決める。"
      - speaker: zundamon
        emotion: angry
        text: "帳簿でも納品書でも、全部見せるのだ！"
      - speaker: kenpei
        text: "台湾人が、うまくやりすぎなんだよ。"
      - speaker: zundamon
        emotion: sad
        text: "……そういう、ことなのだ。"
      - speaker: reimu
        text: "身に覚えのない罪で、45日間拘束されたと言われています。"
        reading: "みにおぼえのないつみで、よんじゅうごにちかん、こうそくされたといわれています。"
        pause_after: 0.6
      - speaker: zundamon
        emotion: sad
        text: "……何も、してないのだ。"
        pause_after: 0.6
      - speaker: reimu
        text: "釈放されたとき、体はぼろぼろでした。"
        reading: "しゃくほうされたとき、からだはぼろぼろでした。"
