# QRコード再現ドラマ（誕生1957→現代）。投稿前に必ず目視レビュー。
# 裏取り: 日本自動車殿堂(dendosha05.pdf)・qrcode.com・denso-wave・levtech30周年
# 1957/8/8杉並生・父文雄(カーボン抵抗特許/逓信省→帝国通信→独立)・中学から囲碁・
# 法政大工学部(オーディオ/無線)・音声認識志望→認識技術の日本電装1980入社・配属は
# バーコード読取機/OCR・NDコード1975トヨタ共同・1985埃の直言→現場主義・1992西尾工場の
# 電話(箱に8〜10個/読むだけで疲れる)→上司直訴(世界一/時間はかけません)→2人チーム・
# ファインダパターン→印刷物調査→1:1:3:1:1・囲碁(ずれ/欠け耐性)・誤り訂正最大約30%・
# 1年半で1994完成(数字約7000字/漢字/10倍速)・Quick Response・トヨタ物流→業界標準・
# ISO 2000/6/15・特許保有のまま無償開放(読取機で収益)・2002/10シャープ携帯・決済/途上国・
# SQRC2007二層・画像入り大容量構想・災害医療・2014欧州発明家賞PopularPrize・
# 2020IEEEマイルストーン・2023恩賜賞/法政名誉博士・現役主席技師
meta:
  title: "工場の「疲れた」から生まれた四角、世界標準になる【QRコード誕生・再現ドラマ・ミーム版】"
  slug: "qr-meme"
  summary: "QRコードを発明した原昌宏の物語。音声認識がやりたくて自動車部品会社に入った青年が、現場に叱られ、一本の電話を受け、たった2人で世界標準を作るまで。碁盤のひらめき、1対1対3対1対1の発見、特許をタダで開放した決断、そしてスマホ決済の時代まで、ずんだもんが原昌宏を演じる再現ドラマでお届けします。"
  tags: ["QRコード", "原昌宏", "デンソー", "再現ドラマ", "ゆっくり", "ずんだもん", "伝記"]
  thumbnail:
    top: "たった2人で作った"
    bottom: "世界標準の四角"
  mode: drama
  narrator: reimu
  mobs:
    - {id: chichi, label: "父", voice: 13, pitch: -0.04, item: mustache}
    - {id: gakuyu, label: "学友", voice: 12, pitch: 0.02, hair: short}
    - {id: joshi, label: "上司", voice: 13, pitch: -0.09, hair: short}
    - {id: veteran, label: "ベテラン", voice: 42, item: mustache}
    - {id: wakate, label: "作業員", voice: 12, hair: short}
    - {id: nishio, label: "西尾工場", voice: 13, pitch: 0.01, hair: short}
    - {id: machikko, label: "街の若者", voice: 12, pitch: 0.04, hair: short}
    - {id: oneesan, label: "街の人", voice: 8, pitch: 0.05, hair: bun}
