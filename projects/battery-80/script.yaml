# 2本目の本番台本（青山龍星・饒舌に畳みかける一人語り／煽り強め）。投稿前に必ず目視レビューすること。
# 事実関係は断定を避けた表現にしてある（劣化要因・保管実験・サイクル寿命の報告など）。
# まとめ章は作らない方針: 締めは行動喚起→逆説の一言→登録呼びかけで終わる。
meta:
  title: "スマホ充電は80%で止めるべき？バッテリー科学の真実"
  slug: "battery-80"
  summary: "毎晩100%まで充電して寝ていませんか。実はスマホメーカー自身が「80%で止める」機能を搭載しています。リチウムイオン電池が劣化する本当の理由と、今日からできる正しい電池ケアを、青山龍星が解説します。"
  tags: ["スマホ", "バッテリー", "充電", "科学", "リチウムイオン電池"]
  thumbnail:
    top: "満タンが寿命を削る"
    bottom: "80%の真実"
scenes:
  - id: hook
    title: ""
    background: m_77e72ca3
    short: true
    cuts:
      - speaker: aoyama
        emotion: surprised
        text: "また今夜も、スマホを100%まで充電して寝ようとしていませんか。ええ、たった今、充電器に挿したあなたの話です。"
        video: assets/clips/hook_gauge.mp4
        video_span: 2
        video_full: true
      - speaker: aoyama
        emotion: normal
        text: "残念なお知らせです。その満タン、電池の寿命をじわじわ削っていると言われています。しかも毎晩、あなた自身の手で、です。"
        telops:
          - {text: "満タンが寿命を削る", size: xl, position: bottom-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
      - speaker: aoyama
        emotion: normal
        text: "しかもですよ。スマホメーカー自身が、80%で充電を止める機能をわざわざ作っている。おかしいと思いませんか。満タンにできるのに、させたくないんです。"
        slide:
          title: "今日のテーマ"
          big: "充電は80%で止めるべき？"
      - speaker: aoyama
        emotion: normal
        text: "今日はこの80%論争に、電池の科学でハッキリ決着をつけます。逆にここで閉じたら、あなたは今夜も知らないまま電池を削って眠ることになります。"
  - id: chapter1
    title: "電池の敵は満タンと熱"
    background: m_07a487b7
    cuts:
      - speaker: aoyama
        emotion: normal
        text: "まず、敵を知りましょう。スマホの中の[リチウムイオン電池|リチウムイオンでんち]、どう動いているか説明できますか。……できませんよね。毎日ポケットに入れているのに。大丈夫、図で見れば10秒で分かります。"
      - speaker: aoyama
        emotion: normal
        text: "充電というのは、リチウムイオンという小さな粒を、片側の電極に、ぎゅうぎゅうに押し込む作業です。仕組みは、たったこれだけ。"
        video: assets/clips/battery_anim.mp4
        video_span: 2
        video_full: true
      - speaker: aoyama
        emotion: normal
        text: "で、満充電。これはもう、朝8時の通勤電車です。限界まで詰め込んだ、あの満員電車。しかも中では熱がこもり、電池には高い電圧がかかり続けます。"
      - speaker: aoyama
        emotion: normal
        background: m_ccee522e
        text: "この満員状態が何時間も続くとどうなるか。中では余計な化学反応が、じわじわ、じわじわ進みます。"
      - speaker: aoyama
        emotion: normal
        text: "部品の表面にゴミのような膜がたまって、イオンの通り道がどんどん塞がれていく。これが劣化の正体のひとつと言われています。"
        slide:
          title: "劣化の正体"
          bullets:
            - "満充電は電池に高い電圧"
            - "内部で余計な反応が進む"
            - "イオンの通り道が減っていく"
      - speaker: aoyama
        emotion: normal
        background: m_092e4238
        text: "そして、もう一人の犯人が、熱。"
      - speaker: aoyama
        emotion: normal
        text: "化学反応は、温度が上がるほど速く進む。つまり劣化も速く進む。単純な話です。"
        telops:
          - {text: "敵は満タンと熱", size: xl, position: bottom-center, color: "#FFFFFF", stroke: "#3A0A0A", glow: "#EE3322", anim: up}
      - speaker: aoyama
        emotion: thinking
        text: "満タンのまま、熱い場所に放置。これが電池にとって最悪のコンボです。……心当たり、ありますよね。枕元で充電しながら動画を見ているそこのあなた、目をそらさない。"
      - speaker: aoyama
        emotion: normal
        text: "2年でヘタったあなたのスマホ。あれは使い倒したからじゃない。満タンと熱にさらされ続けたから、という側面が大きいんです。つまり犯人は、毎晩の充電習慣。ええ、あなたです。"
  - id: chapter2
    title: "80%に科学的な根拠はあるのか"
    background: m_37e7bbee
    cuts:
      - speaker: aoyama
        emotion: thinking
        text: "とはいえ、80%という数字。どこから来たのか気になりませんか。キリがいいだけの数字じゃないのか、と。いいですね、その疑い方。今日はその疑いごと潰します。"
      - speaker: aoyama
        emotion: normal
        text: "電池の研究では、充電状態が高いほど、そして温度が高いほど劣化が速い。この傾向が、嫌というほど繰り返し報告されています。"
        slide:
          title: "研究で知られる傾向"
          bullets:
            - "高い充電状態ほど劣化が速い"
            - "高温で劣化はさらに加速"
            - "中間の充電が最も穏やか"
      - speaker: aoyama
        emotion: normal
        text: "たとえば100%のまま置いた電池は、40%で置いた場合より容量の減りがずっと速いと言われています。使っていなくても、です。置いてあるだけで、減る。怖くないですか。"
        video: assets/clips/graph_decay.mp4
        video_span: 2
        video_full: true
      - speaker: aoyama
        emotion: normal
        text: "0から100まで使い切る充電を繰り返すより、20から80の範囲で使うほうが、寿命が数倍延びたという報告まであります。"
      - speaker: aoyama
        emotion: normal
        background: m_aeac6565
        text: "電池のかたまりである電気自動車の世界では、普段は80%まで、がメーカー公認の常識になりつつあります。何百万円もする電池で、皆そうしているんです。"
      - speaker: aoyama
        emotion: normal
        text: "だからスマホメーカーは、わざわざ上限80%で止める機能を作ったんです。"
        stat: {value: 80, unit: "%", label: "多くのスマホが搭載する充電上限"}
      - speaker: aoyama
        emotion: normal
        text: "iPhoneなら充電上限。Androidならいたわり充電。名前は違っても、思想は全部同じです。"
        video: assets/clips/toggle_80.mp4
        video_full: true
      - speaker: aoyama
        emotion: normal
        text: "つまり80%は、誰かの思いつきでも迷信でもなく、電池の性質から出てきた数字。知らなかったのは、毎日スマホを握りしめている私たちだけだった、というわけです。"
  - id: chapter3
    title: "で、結局どうすればいい？"
    background: m_38782c86
    cuts:
      - speaker: aoyama
        emotion: normal
        text: "じゃあ毎回80%ぴったりで止めればいいのね、と。はい、そこのあなた。真面目すぎます。神経質になる必要はありません。"
      - speaker: aoyama
        emotion: normal
        text: "今のスマホは、あなたが思っているよりずっと賢い。電池を守る仕組みが、最初から入っています。"
        slide:
          title: "スマホが勝手にやってくれること"
          bullets:
            - "満充電後は流入を抑える"
            - "就寝中は満タン到達を遅らせる"
            - "温度を常に監視している"
      - speaker: aoyama
        emotion: normal
        background: m_c49925f5
        text: "最適化充電なんて、あなたの起床時間を学習して、朝起きる直前まで80%で待機しているんですよ。健気だと思いませんか。あなたが寝ている間も、スマホは働いているんです。"
      - speaker: aoyama
        emotion: normal
        text: "その上で、人間がやるべきことは、たった3つです。3つですよ。メモの準備はいいですか。"
        video: assets/clips/care_checklist.mp4
        video_full: true
      - speaker: aoyama
        emotion: normal
        background: m_802775f3
        text: "特に、夏の車内への放置。あれは電池を炙っているのと同じです。熱だけは、本当に避けてください。"
        telops:
          - {text: "熱だけは避けて", size: lg, position: bottom-center, color: "#FFFFFF", stroke: "#3A1A00", glow: "#FF6622", anim: up}
      - speaker: aoyama
        emotion: normal
        text: "ワイヤレス充電も便利ですが、弱点は熱。ケースが熱いなと感じたら、外して充電する。それだけでも違います。"
      - speaker: aoyama
        emotion: happy
        text: "逆に、たまの100%はまったく問題ありません。旅行の日まで80%縛りにする必要はなし。遠慮なく満タンでどうぞ。"
      - speaker: aoyama
        emotion: normal
        text: "そもそもバッテリーは消耗品です。2〜3年使って弱ったら、交換すればいい。完璧主義、いりません。"
  - id: ending
    title: ""
    background: m_415403fb
    cuts:
      - speaker: aoyama
        emotion: normal
        text: "だから、やることはひとつだけ。この動画を閉じる前に、充電上限か最適化充電の設定をオンにする。30秒で終わります。やらない理由、ありますか。"
      - speaker: aoyama
        emotion: normal
        text: "そして本当のコツは、設定をひとつ入れたら、あとはもう忘れることです。"
        telops:
          - {text: "気にしすぎない", size: lg, position: bottom-center, color: "#9FE8FF", stroke: "#0A2A3C", glow: "#33AADD", anim: fade}
      - speaker: aoyama
        emotion: happy
        text: "電池を一番大切にする方法は、電池のことを考えなくていい仕組みを作ること。逆説的ですが、これが答えです。"
      - speaker: aoyama
        emotion: normal
        text: "納得したら、高評価とチャンネル登録を。次回も、あなたが知っているつもりの当たり前を、疑いに来てください。"
        pause_after: 0.8
