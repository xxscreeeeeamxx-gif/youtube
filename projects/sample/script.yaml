# サンプル台本（パイプライン検証用の短縮版・青山龍星の一人語り）
meta:
  title: "【衝撃】空が青いのはウソ？光の正体を5分で解説"
  slug: "sample"
  summary: "空はなぜ青いのか。実は「青く見えているだけ」の仕組みを、青山龍星が5分で解説します。"
  tags: ["空", "科学", "光"]
  thumbnail:
    top: "実は青くない"
    bottom: "空のウソ"
scenes:
  - id: hook
    title: ""
    short: true
    cuts:
      - speaker: aoyama
        emotion: surprised
        text: "空が青いのは当たり前——そう思っていませんか。"
      - speaker: aoyama
        emotion: normal
        text: "実はあの青、『青く見えているだけ』なんです。今日はその仕組みを解説します。"
        slide:
          title: "今日のテーマ"
          big: "空は青くない！？"
  - id: chapter1
    title: "第1章 太陽の光は7色の混ぜもの"
    cuts:
      - speaker: aoyama
        emotion: normal
        text: "まず前提から。太陽の光は白く見えますが、実は7色の光の混ぜものです。"
        slide:
          title: "太陽光の正体"
          bullets:
            - "白い光 = 7色のミックス"
            - "[虹|にじ]は光が分解された姿"
            - "色ごとに波の長さが違う"
      - speaker: aoyama
        emotion: thinking
        text: "虹が7色なのは、光が色ごとに分解されているからなんですね。"
      - speaker: aoyama
        emotion: normal
        text: "そしてポイントは、色ごとに『波の長さ』が違うことです。"
  - id: chapter2
    title: "第2章 青い光は散らかりやすい"
    cuts:
      - speaker: aoyama
        emotion: normal
        text: "青い光は波が短く、空気の粒にぶつかると四方八方に散らばります。"
        # 動画クリップ埋め込みの検証用（ytf assets --init で生成されるデモ素材）
        video: assets/clips/demo.mp4
      - speaker: aoyama
        emotion: surprised
        text: "つまり空全体から青い光が飛んでくる。だから見上げると青いんです。"
      - speaker: aoyama
        emotion: normal
        text: "夕焼けが赤いのは、光の通り道が長くなって青が先に散らばり切るからです。"
        slide:
          title: "まとめ"
          bullets:
            - "青い光はすぐ散らばる"
            - "昼の空 = 散った青"
            - "夕焼け = 生き残った赤"
  - id: ending
    title: "まとめ"
    cuts:
      - speaker: aoyama
        emotion: happy
        text: "空の青は、光のかくれんぼだったんですね。少し得した気分になりませんか。"
      - speaker: aoyama
        emotion: normal
        text: "面白いと思ったら、高評価とチャンネル登録をお願いします。"
        pause_after: 0.6
