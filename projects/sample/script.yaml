# サンプル台本（パイプライン検証用の短縮版）
meta:
  title: "【衝撃】空が青いのはウソ？光の正体を5分で解説"
  slug: "sample"
  summary: "空はなぜ青いのか。実は「青く見えているだけ」の仕組みを、ずんだもんと四国めたんが解説します。"
  tags: ["空", "科学", "光"]
  thumbnail:
    top: "実は青くない"
    bottom: "空のウソ"
scenes:
  - id: hook
    title: ""
    short: true
    cuts:
      - speaker: zunda
        emotion: surprised
        text: "ねえめたん、空って本当は青くないって聞いたのだ！どういうことなのだ！？"
      - speaker: metan
        emotion: normal
        text: "ええ、正確には『青く見えているだけ』ね。今日はその仕組みを解説するわ。"
        slide:
          title: "今日のテーマ"
          big: "空は青くない！？"
  - id: chapter1
    title: "第1章 太陽の光は7色の混ぜもの"
    cuts:
      - speaker: metan
        emotion: normal
        text: "まず前提から。太陽の光は白く見えるけど、実は7色の光の混ぜものなの。"
        slide:
          title: "太陽光の正体"
          bullets:
            - "白い光 = 7色のミックス"
            - "[虹|にじ]は光が分解された姿"
            - "色ごとに波の長さが違う"
      - speaker: zunda
        emotion: thinking
        text: "たしかに虹は7色なのだ。あれって光が分解されてたのだ？"
      - speaker: metan
        emotion: happy
        text: "そのとおり。そして色ごとに『波の長さ』が違うのがポイントよ。"
  - id: chapter2
    title: "第2章 青い光は散らかりやすい"
    cuts:
      - speaker: metan
        emotion: normal
        text: "青い光は波が短くて、空気の粒にぶつかると四方八方に散らばるの。"
      - speaker: zunda
        emotion: surprised
        text: "つまり空全体から青だけが飛んでくるのだ！だから見上げると青いのだ！"
      - speaker: metan
        emotion: happy
        text: "正解。夕焼けが赤いのは、光の通り道が長くなって青が先に散らばり切るからよ。"
        slide:
          title: "まとめ"
          bullets:
            - "青い光はすぐ散らばる"
            - "昼の空 = 散った青"
            - "夕焼け = 生き残った赤"
  - id: ending
    title: "まとめ"
    cuts:
      - speaker: zunda
        emotion: happy
        text: "空の青は、光のかくれんぼだったのだ！ちょっと得した気分なのだ。"
      - speaker: metan
        emotion: normal
        text: "面白いと思ったら、高評価とチャンネル登録をお願いね。"
        pause_after: 0.6
