  # ================= 晩年 =================
  - id: bannen
    title: "止まらない人"
    background: m_2e945393
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.28, tag: "百福", flip: true}
      - {who: tsumugi, x: 0.76, tag: "仁子"}
    cuts:
      - speaker: reimu
        text: "その後の広がりは、数字が語ります。"
      - speaker: reimu
        text: "インスタントラーメンは今、世界で年間1000億食と言われています。"
        stat: {value: 1000, unit: "億食", label: "世界の年間消費量"}
      - speaker: zundamon
        emotion: surprised
        text: "地球の全員が、年に12杯以上食べてる計算なのだ！"
      - speaker: reimu
        text: "[百福|ももふく]は90歳を過ぎても、開発の現場に立ち続けました。"
      - speaker: reimu
        text: "2005年には宇宙食のラーメンを完成させます。95歳でした。"
        video: assets/clips/astronaut.mp4
        video_span: 4
        video_full: true
        video_speed: 0.8
      - speaker: zundamon
        emotion: surprised
        text: "95歳で宇宙なのだ！？引退という言葉を知らないのだ！"
      - speaker: reimu
        text: "麺は一口サイズ、スープにはとろみ。無重力への対策です。"
      - speaker: zundamon
        emotion: happy
        text: "小屋の麺が、ついに地球を出たのだ。"
      - speaker: reimu
        text: "そして生涯、昼食はほぼ毎日チキンラーメンだったそうです。"
      - speaker: zundamon
        emotion: happy
        text: "発明した本人が、一番のファンなのだ。"
      - speaker: reimu
        text: "2007年1月。96歳で、その生涯を閉じました。"
      - speaker: tsumugi
        emotion: sad
        text: "最後まで、麺と一緒の人生だったね。"
      - speaker: reimu
        text: "人生に遅すぎるということはない。そう語り続けた人でした。"
        telops:
          - {text: "人生に遅すぎるということはない", size: lg, position: middle-center, color: "#FFFFFF", stroke: "#1E222E", anim: fade}
