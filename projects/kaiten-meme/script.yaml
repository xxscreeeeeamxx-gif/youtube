        text: "握りの仕事を、教えてほしいんだ。"
      - speaker: tonari
        text: "……あんた、それ、商売敵に言うことか？"
      - speaker: zundamon
        emotion: normal
        text: "承知の上なのだ。この通りなのだ。"
      - speaker: tonari
        text: "頭を上げてくれや。"
      - speaker: zundamon
        emotion: normal
        text: "寿司を、庶民の食べ物に戻したいぞ。"
      - speaker: zundamon
        emotion: normal
        text: "気取らない値段で、腹いっぱい食わせたいんだ。"
      - speaker: tonari
        text: "……ええ心意気や。ほな、教えたる。"
      - speaker: zundamon
        emotion: surprised
        text: "いいのだ！？"
      - speaker: tonari
        text: "戦後は助け合いや。その代わり、握りは厳しくいくで。"
      - speaker: zundamon
        emotion: happy
        text: "望むところなのだ！"
      - speaker: reimu
        text: "商売敵が、師匠になりました。"
        reading: "しょうばいがたきが、ししょうになりました。"
      - speaker: tonari
        text: "シャリは強く握ったらあかん。ふわっとや。"
      - speaker: zundamon
        emotion: thinking
        text: "ふわっと……むずかしいぞ。"
      - speaker: tonari
        text: "ネタは手の温度で変わる。もたもたすな。"
      - speaker: zundamon
        emotion: happy
        text: "早いのは、得意なんだ！"
      - speaker: tonari
        text: "あかん、シャリが硬い。握り直しや。"
      - speaker: zundamon
        emotion: sad
        text: "80回目のやり直し。苦行周回なんだが……。"
      - speaker: tonari
        text: "80回で[音|ね]を上げるな。わしは3年かかった。"
      - speaker: zundamon
        emotion: normal
        text: "3年ぶんを3か月でクリアする。RTAだ。"
      - speaker: tonari
        text: "言うたな。ほな夜も特訓や。"
      - speaker: zundamon
        emotion: happy
        text: "望むところなのだ！"
      - speaker: reimu
        text: "昼は店、夜は特訓の日々が続きました。"
        reading: "ひるわみせ、よるわとっくんのひびがつづきました。"
      - speaker: tonari
        text: "……ほんまに早いな。筋がええわ。"
      - speaker: reimu
        text: "こうして元禄は、寿司の店になりました。"
        reading: "こうしてげんろくわ、すしのみせになりました。"
  - id: tachigui
    title: ""
    background: il_ks_tachigui
    bgm: honwaka_puppu
    stage:
