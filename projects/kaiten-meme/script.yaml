        text: "帳面の上では、ね。"
      - speaker: zundamon
        emotion: surprised
        text: "……現金が、ぜんぜん無いんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "みんな「ツケで頼むわ」って帰るからね。"
      - speaker: wakamono_k
        text: "大将、うまかったわ。ツケといて！"
      - speaker: zundamon
        emotion: surprised
        text: "ま、待つのだ！先月のぶんもまだ……行ってしまったぞ。"
      - speaker: zundamon
        emotion: sad
        text: "ツケ、ツケ、またツケ。はい、詰んだ。"
      - speaker: tsumugi
        emotion: normal
        text: "戦後はどこも、お金がないのよ。"
      - speaker: zundamon
        emotion: sad
        text: "気持ちは分かるのだ。でも、うちも仕入れができないんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "このままだと、お店が持たないよ。"
      - speaker: zundamon
        emotion: normal
