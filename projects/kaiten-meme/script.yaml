      - speaker: tsumugi
        emotion: happy
        text: "はい、お茶どうぞ。"
      - speaker: wakamono_k
        text: "うまい！もう1皿！"
      - speaker: zundamon
        emotion: happy
        text: "きたきたきた！"
      - speaker: wakamono_k
        text: "せやけど大将、この値段で儲かるんか？"
      - speaker: zundamon
        emotion: normal
        text: "立ち食いだから、席がすぐ空くんだ。"
      - speaker: zundamon
        emotion: normal
        text: "安くても、たくさん売れば成り立つのだ。"
      - speaker: wakamono_k
        text: "ほー、考えとるなあ。"
      - speaker: zundamon
        emotion: happy
        text: "薄利多売。商売の基本なのだ。"
      - speaker: reimu
        text: "集団就職で大阪に来た若者たちが、毎日詰めかけました。"
        reading: "しゅうだんしゅうしょくでおおさかにきたわかものたちが、まいにちつめかけました。"
      - speaker: tsumugi
        emotion: happy
        text: "今日も満員。ありがたいねえ。"
      - speaker: zundamon
        emotion: happy
        text: "腕がちぎれそうなのだ。でも、うれしい悲鳴だ。"
      - speaker: wakamono_k
        text: "大将、こっちにも1皿！"
      - speaker: zundamon
        emotion: happy
        text: "いま行くぞ！"
