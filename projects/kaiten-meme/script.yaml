      - speaker: zundamon
        emotion: happy
        text: "カネが入る。実質[勝ち確|かちかく]の名前だろ！"
      - speaker: tsumugi
        emotion: thinking
        text: "発想が商売人すぎる。"
      - speaker: zundamon
        emotion: happy
        text: "大阪でやっていくには、これくらいでいいんだ。"
      - speaker: reimu
        text: "開店初日。"
        reading: "かいてんしょにち。"
      - speaker: zundamon
        emotion: thinking
        text: "のれんを出すのだ。……お客さん、来るのだ？"
      - speaker: tsumugi
        emotion: happy
        text: "さっそく1人目。いらっしゃいませ！"
      - speaker: zundamon
        emotion: happy
        text: "煮付けに、だし巻きに、なんでも作るんだ！"
      - speaker: tsumugi
        emotion: happy
        text: "大将、張り切りすぎ。"
      - speaker: reimu
        text: "小料理屋、元禄。のちの世界企業の一号店です。"
        reading: "こりょうりや、げんろく。のちのせかいきぎょうのいちごうてんです。"
  - id: tsuke
    title: ""
    background: il_ks_koryori
    bgm: kinakusai
    stage:
      - {who: zundamon, x: 0.22, tag: "白石", flip: true}
