# 回転寿司再現ドラマ（白石義明・誕生1913→現代）。投稿前に必ず目視レビュー。
# 裏取りはビルダーdocstring参照（Wikipedia/元禄寿司公式/リクナビNEXT/J-Net21/イノベーション100選）
meta:
  title: "皿を回した男。人手不足の寿司屋がビール工場で見つけた答え【回転寿司誕生・再現ドラマ・ミーム版】"
  slug: "kaiten-meme"
  summary: "回転寿司を発明した白石義明の物語。愛媛の板前が34歳で大阪へ。ツケ地獄の小料理屋、商売敵に頭を下げて覚えた握り、1皿20円の立ち食い寿司、そして人手不足。ビール工場のベルトコンベアに「これや！」とひらめき、町工場と夜な夜な10年。トランプの扇から生まれたうろこ板、毎秒8センチの計算、人工衛星廻る寿司、万博の大行列から機械遺産まで、ずんだもんが白石義明を演じる再現ドラマでお届けします。"
  tags: ["回転寿司", "白石義明", "元禄寿司", "再現ドラマ", "ゆっくり", "ずんだもん", "伝記"]
  thumbnail:
    top: "皿を回した男"
    bottom: "毎秒8センチの発明"
  mode: drama
  narrator: reimu
  mobs:
    - {id: oyakata, label: "親方", voice: 42, item: mustache}
    - {id: tonari, label: "隣の寿司屋", voice: 13, pitch: -0.06, item: mustache}
    - {id: deshi, label: "店の少年", voice: 12, hair: short}
    - {id: wakamono_k, label: "客の若者", voice: 12, pitch: 0.03, hair: short}
    - {id: okyaku, label: "客", voice: 8, pitch: 0.04, hair: bun}
    - {id: shacho, label: "町工場の社長", voice: 13, pitch: -0.09, item: mustache}
    - {id: nakama, label: "見学仲間", voice: 13, pitch: 0.02, hair: short}
    - {id: gaikoku, label: "外国のお客", voice: 13, pitch: 0.05, item: hat}
    - {id: kisha, label: "記者", voice: 13, pitch: -0.02, item: hat}
    - {id: kodomo_k, label: "子ども", voice: 12, pitch: 0.1, hair: short}
scenes:
  - id: hook
    title: ""
    background: il_ks_gendai
    bgm: shuffle_shuffle
    stage:
      - {who: zundamon, x: 0.3, flip: true}
      - {who: tsumugi, x: 0.74}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "回転寿司に来た！今日は10皿チャレンジ、優勝しにきたぞ！"
      - speaker: tsumugi
        emotion: normal
        text: "宣言はいいけど、もう6皿目だよ。"
      - speaker: zundamon
        emotion: happy
        text: "回ってるお寿司、ぜんぶSSRに見えるんだよね。"
      - speaker: tsumugi
        emotion: normal
        text: "それ、お店の狙いどおりだね。"
      - speaker: zundamon
        emotion: happy
        text: "サーモン、はまち、たまご……あっ、またサーモンだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "サーモン3皿目じゃない。"
      - speaker: zundamon
        emotion: normal
        text: "目の前を通ると取っちゃう。これは沼。"
      - speaker: zundamon
        emotion: surprised
        text: "……お皿の塔が、視界を超えた件について。"
      - speaker: tsumugi
        emotion: normal
        text: "はい、10皿。有言実行だね。"
      - speaker: zundamon
        emotion: thinking
        text: "ところで、なんでお寿司は回ってるんだ？"
      - speaker: tsumugi
        emotion: normal
        text: "お、いい質問。このレーン、誰が作ったか知ってる？"
      - speaker: zundamon
        emotion: thinking
        text: "……寿司ロボットの祖先？"
      - speaker: tsumugi
        emotion: normal
        text: "愛媛から出てきた、寿司屋のおじさん。"
      - speaker: zundamon
        emotion: surprised
        text: "おじさん！？"
      - speaker: tsumugi
        emotion: happy
        text: "ビール工場を見て、ひらめいたんだって。"
      - speaker: zundamon
        emotion: thinking
        text: "ビールとお寿司、つながらないんだ。"
      - speaker: tsumugi
        emotion: happy
        text: "つながるんだなあ、これが。今日はその話。"
      - speaker: zundamon
        emotion: happy
        text: "10皿目を食べながら聞くぞ！"
      - speaker: reimu
        text: "回転寿司。いまや日本中の週末の定番です。"
        reading: "かいてんずし。いまやにほんじゅうのしゅうまつのていばんです。"
      - speaker: reimu
        text: "この仕組みを発明したのは、白石義明という寿司屋の主人でした。"
        reading: "このしくみをはつめいしたのわ、しらいしよしあきというすしやのしゅじんでした。"
      - speaker: reimu
        text: "物語は、1913年の愛媛から始まります。"
        reading: "ものがたりわ、せんきゅうひゃくじゅうさんねんのえひめからはじまります。"
  - id: era1913
    title: "1913・海の町から"
    background: il_ks_ehime
    bgm: natsuyasumi
    stage:
      - {who: zundamon, x: 0.15, tag: "白石", flip: true, scale: 0.8}
    cuts:
      - speaker: reimu
        text: "1913年、愛媛。"
        reading: "せんきゅうひゃくじゅうさんねん、えひめ。"
        video: assets/clips/era_k1913.mp4
        video_full: true
        pause_after: 0.8
  - id: ehime
    title: ""
    background: il_ks_ehime
    bgm: natsuyasumi
    stage:
      - {who: zundamon, x: 0.26, tag: "白石", flip: true, scale: 0.8}
      - {who: oyakata, x: 0.72}
    cuts:
      - speaker: reimu
        text: "白石義明は、海と山の近い町に生まれました。"
        reading: "しらいしよしあきわ、うみとやまのちかいまちにうまれました。"
      - speaker: zundamon
        emotion: happy
        text: "海の魚も、山のみかんも、うまいぞ。"
      - speaker: zundamon
        emotion: normal
        text: "食べるのが好きなら、作るのも好きになるんだ。"
      - speaker: reimu
        text: "やがて白石は、料理の道へ進みます。"
        reading: "やがてしらいしわ、りょうりのみちえすすみます。"
      - speaker: oyakata
        text: "義明、包丁は毎日研げ。"
      - speaker: zundamon
        emotion: happy
        text: "りょうかいだぞ！"
      - speaker: oyakata
        text: "研ぎが甘いと、味も甘くなるぞ。"
      - speaker: zundamon
        emotion: thinking
        text: "……味は甘いほうがよくないのだ？"
      - speaker: oyakata
        text: "そういう甘いじゃないわ。"
      - speaker: zundamon
        emotion: normal
        text: "親方スパルタで草。でも、覚えるんだ。"
      - speaker: reimu
        text: "板前としての修業の日々が続きました。"
        reading: "いたまえとしてのしゅぎょうのひびがつづきました。"
      - speaker: oyakata
        text: "義明、お前は手が早いな。"
      - speaker: zundamon
        emotion: normal
        text: "お客さんを待たせるのが、嫌いだ。"
      - speaker: oyakata
        text: "ほう。料理人の才能だ、それは。"
      - speaker: zundamon
        emotion: happy
        text: "待たせない料理人に、なるのだ！"
      - speaker: reimu
        text: "皿洗いから焼き場、煮物まで。修業は続きます。"
        reading: "さらあらいからやきば、にものまで。しゅぎょうわつづきます。"
      - speaker: oyakata
        text: "義明、賄い当番や。"
      - speaker: zundamon
        emotion: happy
        text: "任せるのだ。余り物で一品つくるんだ。"
      - speaker: oyakata
        text: "……うまいな。余り物とは思えん。"
      - speaker: zundamon
        emotion: happy
        text: "安いもので喜ばせるのが、腕なんだ。"
      - speaker: oyakata
        text: "その考え、忘れるなよ。"
      - speaker: zundamon
        emotion: normal
        text: "忘れないのだ。安くて、うまいが一番だ。"
  - id: era1947
    title: "1947・34歳の再出発"
    background: il_ks_eki
    bgm: 10do
    stage:
      - {who: zundamon, x: 0.15, tag: "白石", flip: true}
    cuts:
      - speaker: reimu
        text: "1947年、大阪。"
        reading: "せんきゅうひゃくよんじゅうななねん、おおさか。"
        video: assets/clips/era_k1947.mp4
        video_full: true
        pause_after: 0.8
  - id: osaka
    title: ""
    background: il_ks_eki
    bgm: 10do
    stage:
      - {who: zundamon, x: 0.24, tag: "白石", flip: true}
      - {who: tsumugi, x: 0.76, tag: "女将"}
    cuts:
      - speaker: reimu
        text: "戦争が終わって2年。白石は34歳で、愛媛から大阪に出てきました。"
        reading: "せんそうがおわってにねん。しらいしわさんじゅうよんさいで、えひめからおおさかにでてきました。"
      - speaker: zundamon
        emotion: normal
        text: "着いた。ここが大阪、食のラスボスの城なんだわ。"
      - speaker: tsumugi
        emotion: normal
        text: "すごい人ね。みんな早足。"
      - speaker: zundamon
        emotion: happy
        text: "食いだおれの街。腕試しには最高だろ。"
      - speaker: tsumugi
        emotion: normal
        text: "お店、どこに構えるの？"
      - speaker: zundamon
        emotion: normal
        text: "布施なのだ。駅前で、人通りがあるんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "ねえ、あっちの通り、屋台がずらっと並んでる。"
      - speaker: zundamon
        emotion: normal
        text: "うどんに、おでんに、天ぷら……。"
      - speaker: zundamon
        emotion: thinking
        text: "みんな、食べることに必死なのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "衣食住の食が、いちばん先ね。"
      - speaker: tsumugi
        emotion: thinking
        text: "貯金、ほとんど無くなるけど。"
      - speaker: zundamon
        emotion: normal
        text: "板前の腕は、戦争でも焼けなかったぞ。"
      - speaker: zundamon
        emotion: happy
        text: "腕一本で、やり直すのだ！"
      - speaker: tsumugi
        emotion: happy
        text: "……ふふ。じゃあ、ついていくよ。"
      - speaker: reimu
        text: "夫婦の再出発でした。"
        reading: "ふうふのさいしゅっぱつでした。"
        pause_after: 0.5
  - id: genroku
