# 電気炊飯器再現ドラマ・ミーム版（三並義忠×風美子・1950頃→現代）。投稿前に必ず目視レビュー。
# 本編rice-cookerのセリフをネットミーム化した派生版。ナレ行・クリップ・年号カードは本編と共用（位相同期なし）。
# 裏取りはビルダーdocstring参照（三並義忠Wikipedia/イノベーション100選/SK弁理士法人/
# All About/東芝ライフスタイル沿革）
meta:
  title: "スイッチひとつで、失敗しない。妻が千回炊いた世界初の電気炊飯器【ゆっくり再現ドラマ・ミーム版】"
  slug: "rice-cooker-meme"
  summary: "世界初の自動式電気炊飯器を作った町工場の夫婦、三並義忠と風美子の物語。夜明け前からの火の番が主婦の重労働だった時代、東芝は大手も諦めた自動炊飯を小さな光伸社に託す。妻の風美子は1日20回、4か月で千回ごはんを炊き、家の米が尽きれば家と工場を担保に。倒れても続けた末に掴んだ98度20分のデータ、一杯の水を時計に変えた二重釜間接炊きのひらめき。1955年の発売から台所革命まで、ずんだもんが三並を、つむぎが風美子を演じる再現ドラマ・ミーム版でお届けします。"
  tags: ["炊飯器", "電気釜", "三並義忠", "東芝", "再現ドラマ", "ゆっくり", "ずんだもん", "昭和", "ミーム"]
  thumbnail:
    top: "妻が千回炊いた"
    bottom: "失敗しない箱"
  mode: drama
  narrator: reimu
  mobs:
    - {id: yamada, label: "東芝の山田", voice: 13, pitch: -0.05, item: hat}
    - {id: kyaku, label: "主婦", voice: 8, pitch: 0.05, hair: bun}
scenes:
  - id: hook
    title: ""
    background: il_rc_kitchen
    bgm: shuffle_shuffle
    stage:
      - {who: zundamon, x: 0.3, flip: true}
      - {who: tsumugi, x: 0.74}
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "ごはん、炊けたのだ！ボタンひとつで優勝なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "早いね。お米といで、スイッチ押しただけでしょ。"
      - speaker: zundamon
        emotion: happy
        text: "それだけで、ふっくらツヤツヤ。[QOL|きゅーおーえる]爆上がりだ。"
      - speaker: zundamon
        emotion: happy
        text: "火加減も、見張りも、ノーダメで済むんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "焦がしたことも、芯が残ったことも、ないもんね。"
      - speaker: zundamon
        emotion: happy
        text: "炊飯器は、失敗しない魔法の箱なのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "その「魔法」、実は物理と、千回の根性のかたまりなんだよ。"
      - speaker: zundamon
        emotion: thinking
        text: "物理と、根性……？急に、重いワードが爆誕したぞ。"
      - speaker: tsumugi
        emotion: normal
        text: "その「失敗しない」が、どれだけすごいか分かる？"
      - speaker: zundamon
        emotion: thinking
        text: "……ボタン押すだけだ。ふつうだが。"
      - speaker: tsumugi
        emotion: normal
        text: "昔はね、ごはんを炊くのが、一日で一番の重労働だったの。"
      - speaker: zundamon
        emotion: surprised
        text: "ごはんを炊くのが、重労働！？"
      - speaker: tsumugi
        emotion: normal
        text: "夜明け前に起きて、かまどの火を、ずっと見張る。"
      - speaker: zundamon
        emotion: surprised
        text: "スイッチひとつじゃ、なかったのだ……。"
      - speaker: tsumugi
        emotion: normal
        text: "その火の番から、主婦を解放した箱なんだよ、これ。"
      - speaker: zundamon
        emotion: thinking
        text: "誰が作ったんだ？大きな電機メーカーか？"
      - speaker: tsumugi
        emotion: normal
        text: "町工場の夫婦。奥さんが、千回ごはんを炊いたの。"
      - speaker: zundamon
        emotion: surprised
        text: "せ、千回！？ガチのやつかよ！"
      - speaker: tsumugi
        emotion: happy
        text: "今日はその話。炊きたてを食べながら、聞いていこう。"
      - speaker: zundamon
        emotion: happy
        text: "おかわりしながら聞くぞ！"
      - speaker: reimu
        text: "炊飯器。スイッチひとつで、失敗なくごはんが炊ける箱です。"
        reading: "すいはんき。すいっちひとつで、しっぱいなくごはんがたけるはこです。"
      - speaker: reimu
        text: "世界で初めて作ったのは、町工場の夫婦でした。"
        reading: "せかいではじめてつくったのわ、まちこうばのふうふでした。"
      - speaker: reimu
        text: "物語は、1950年ごろの東京から始まります。"
        reading: "ものがたりわ、せんきゅうひゃくごじゅうねんごろのとうきょうからはじまります。"
  - id: era1950
    title: "ごはんは、重労働だった"
    background: il_rc_kamado
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.15, tag: "三並", flip: true}
    cuts:
      - speaker: reimu
        text: "1950年ごろ、東京。"
        reading: "せんきゅうひゃくごじゅうねんごろ、とうきょう。"
        video: assets/clips/era_r1950.mp4
        video_full: true
        pause_after: 0.8
  - id: kamado
    title: ""
    background: il_rc_kamado
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: tsumugi, x: 0.76, tag: "風美子"}
    cuts:
      - speaker: reimu
        text: "当時、ごはんはかまどで炊くのが当たり前でした。"
        reading: "とうじ、ごはんわかまどでたくのがあたりまえでした。"
      - speaker: tsumugi
        emotion: normal
        text: "まだ暗いうちに起きて、火をおこすの。"
      - speaker: zundamon
        emotion: surprised
        text: "夜明け前からかよ！？"
      - speaker: tsumugi
        emotion: normal
        text: "はじめチョロチョロ、なかパッパ。火加減が命なのよ。"
      - speaker: zundamon
        emotion: thinking
        text: "強すぎると焦げて、弱すぎると芯が残る。無理ゲーだ。"
      - speaker: tsumugi
        emotion: normal
        text: "だから、そばを離れられない。赤ん坊を背負ったままね。"
      - speaker: zundamon
        emotion: sad
        text: "煙で目は痛いし、夏は汗だくだ……。"
      - speaker: tsumugi
        emotion: normal
        text: "少しでも火から目を離すと、すぐ焦げるの。"
      - speaker: zundamon
        emotion: sad
        text: "つきっきりで、他のことは何もできないんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "沸いてきたら火を弱めて、蒸らして。何十年も体で覚えた勘よ。"
      - speaker: zundamon
        emotion: thinking
        text: "その勘を、新米のお嫁さんは、一から仕込まれるんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "毎日、朝昼晩。[日本中|にほんじゅう]の主婦が、火の番をしてたの。"
      - speaker: zundamon
        emotion: sad
        text: "料理より前に、炊くだけで[HP|えいちぴー]ゼロだ。"
      - speaker: reimu
        text: "炊飯は、掃除や洗濯と並ぶ、主婦の重い仕事でした。"
        reading: "すいはんわ、そうじやせんたくとならぶ、しゅふのおもいしごとでした。"
      - speaker: tsumugi
        emotion: thinking
        text: "この火の番が、なくなったら……。"
      - speaker: zundamon
        emotion: normal
        text: "電気で、勝手に炊けたら。夢みたいな話だ。"
      - speaker: reimu
        text: "その夢に、町工場の夫婦が挑みます。"
        reading: "そのゆめに、まちこうばのふうふがいどみます。"
  - id: irai
    title: "町工場への、無茶な依頼"
    background: il_rc_koba
    bgm: pastel_house
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: yamada, x: 0.72}
    cuts:
      - speaker: reimu
        text: "三並義忠は、光伸社という小さな町工場の主人でした。"
        reading: "みなみよしただわ、こうしんしゃというちいさなまちこうばのしゅじんでした。"
      - speaker: zundamon
        emotion: normal
        text: "うちは、精密な測定器を作る工場だ。"
      - speaker: yamada
        text: "三並さん。東芝の山田です。折り入って、お願いが。"
      - speaker: zundamon
        emotion: surprised
        text: "天下の東芝さんが、うちに？"
      - speaker: yamada
        text: "電気で、自動でごはんが炊ける釜を、作ってほしい。"
      - speaker: zundamon
        emotion: thinking
        text: "自動で、炊ける釜……その発想はなかったぞ。"
      - speaker: yamada
        text: "実は、大手のメーカーが何社も挑んで、諦めました。"
      - speaker: zundamon
        emotion: surprised
        text: "大手が匙を投げたものを、うちの町工場に？"
      - speaker: yamada
        text: "測定器で鍛えた、あなたの精密さに賭けたい。"
      - speaker: zundamon
        emotion: thinking
        text: "なぜ、大手は諦めたんだ？"
      - speaker: yamada
        text: "火加減が、どうしても自動にならない。焦がすか、生煮えか。"
      - speaker: zundamon
        emotion: thinking
        text: "人が見て加減してたものを、機械にやらせるのか。"
      - speaker: yamada
        text: "電気を入れて、切る。ただそれだけが、できないんです。"
      - speaker: zundamon
        emotion: thinking
        text: "……正直に聞くぞ。研究のお金は、出るんだ？"
      - speaker: yamada
        text: "……それが。売れる保証がないので、出せません。"
      - speaker: zundamon
        emotion: thinking
        text: "タダ働きで、大手が爆死したものに挑めと。"
      - speaker: yamada
        text: "虫のいい話なのは、承知です。でも、あなたにしか。"
      - speaker: reimu
        text: "割に合わない仕事でした。それでも、三並の心は動きます。"
        reading: "わりにあわないしごとでした。それでも、みなみのこころわうごきます。"
      - speaker: zundamon
        emotion: normal
        text: "……あの、火の番の苦労が、なくなるんだ。"
      - speaker: zundamon
        emotion: normal
        text: "それは、やる価値があるぞ。"
      - speaker: yamada
        text: "引き受けて、いただけますか。"
      - speaker: zundamon
        emotion: happy
        text: "やるのだ。世界の台所を、変えるぞ。"
      - speaker: reimu
        text: "東芝の山田正吾との、握手でした。"
        reading: "とうしばのやまだしょうごとの、あくしゅでした。"
  - id: naze
    title: "なぜ、自動は難しいのか"
    background: il_rc_home
    bgm: you_and_me
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: tsumugi, x: 0.76, tag: "風美子"}
    cuts:
      - speaker: reimu
        text: "家に持ち帰ると、妻の風美子が待っていました。"
        reading: "いえにもちかえると、つまのふみこがまっていました。"
      - speaker: tsumugi
        emotion: normal
        text: "あなた、浮かない顔ね。どんなお仕事？"
      - speaker: zundamon
        emotion: normal
        text: "電気で、自動でごはんを炊く釜だ。"
      - speaker: tsumugi
        emotion: happy
        text: "あら、それができたら、主婦は大助かりよ。"
      - speaker: zundamon
        emotion: thinking
        text: "でも、難しいんだ。火加減が、全部なんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "どういうこと？"
      - speaker: zundamon
        emotion: normal
        text: "強火で炊いて、ちょうどよく水がなくなったら止める。"
      - speaker: zundamon
        emotion: thinking
        text: "その「ちょうど」が、毎回ちがうんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "お米の量でも、変わるものね。"
      - speaker: zundamon
        emotion: normal
        text: "冬と夏でも、水の温度がちがう。同じ時間じゃ、詰むんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "新米と古米でも、吸う水の量がちがうしね。"
      - speaker: zundamon
        emotion: thinking
        text: "2合と5合でも、火の通り方がまるでちがうぞ。"
      - speaker: tsumugi
        emotion: normal
        text: "条件が、いくつも掛け算になる。かまどは、それを人が見てた。"
      - speaker: tsumugi
        emotion: thinking
        text: "かまどなら、人が見て加減する。でも、機械は……。"
      - speaker: zundamon
        emotion: thinking
        text: "機械には、目も舌もないんだ。どう止めさせるか。"
      - speaker: tsumugi
        emotion: normal
        text: "……いつ火を止めればいいか、機械に教えないと。"
      - speaker: zundamon
        emotion: normal
        text: "そこが、大手も越えられなかったラスボスなのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "あなた一人じゃ、無理よ。"
      - speaker: zundamon
        emotion: surprised
        text: "……手伝ってくれるのか？"
      - speaker: tsumugi
        emotion: happy
        text: "ごはんを炊くことなら、あなたより私のほうが上手よ。"
      - speaker: reimu
        text: "こうして、夫婦の挑戦が始まりました。"
        reading: "こうして、ふうふのちょうせんがはじまりました。"
  - id: jikken
    title: "千回、炊く"
    background: il_rc_home
    bgm: curious
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: tsumugi, x: 0.76, tag: "風美子"}
    cuts:
      - speaker: reimu
        text: "解決の糸口は、ただひたすら、炊いてみることでした。"
        reading: "かいけつのいとぐちわ、ただひたすら、たいてみることでした。"
      - speaker: tsumugi
        emotion: normal
        text: "まず、いろんな条件で炊いて、記録するのね。"
      - speaker: zundamon
        emotion: normal
        text: "水の量、火の強さ、時間。ぜんぶ変えて試すぞ。"
      - speaker: tsumugi
        emotion: normal
        text: "1回目。強火で、15分。……芯が残ってる。"
      - speaker: zundamon
        emotion: normal
        text: "記録なのだ。次は、20分で試すぞ。"
      - speaker: tsumugi
        emotion: happy
        text: "2回目。20分。……あら、いい感じ。"
      - speaker: zundamon
        emotion: normal
        text: "でも、たまたまかもしれない。もう1回だ。"
      - speaker: tsumugi
        emotion: normal
        text: "3回目、4回目……。1日20回、炊いた日もあったわ。"
      - speaker: zundamon
        emotion: happy
        text: "朝から晩まで、家じゅう湯気だらけだ。"
      - speaker: reimu
        text: "風美子は来る日も来る日も、ごはんを炊き続けました。"
        reading: "ふみこわくるひもくるひも、ごはんをたきつづけました。"
      - speaker: tsumugi
        emotion: normal
        text: "温度計を、お米にさして。……98度。"
      - speaker: zundamon
        emotion: normal
        text: "温度と、時間と、炊きあがり。全部を表にするんだ。"
      - speaker: tsumugi
        emotion: happy
        text: "家族みんなで、毎食、実験のごはんを食べたわね。"
      - speaker: zundamon
        emotion: happy
        text: "息子たちも、味の判定係だ。舌の有識者なのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "「今日のはちょっと硬い」「昨日のがよかった」ってね。"
      - speaker: zundamon
        emotion: thinking
        text: "毎食ごはんばかりで、おかずが寂しいぞ。"
      - speaker: tsumugi
        emotion: normal
        text: "文句も言わず、家族みんなで支えてくれたわ。"
      - speaker: zundamon
        emotion: normal
        text: "1回ごとに、水と時間と温度を、几帳面に書き留めるんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "その帳面が、だんだん分厚くなっていってね。"
      - speaker: tsumugi
        emotion: normal
        text: "焦げても、芯があっても、残さず食べてくれた。"
      - speaker: zundamon
        emotion: normal
        text: "失敗作も、大事なデータ。ぜんぶ経験値なのだ。"
  - id: shippai
    title: "時計では、止まらない"
    background: il_rc_lab
    bgm: kinakusai
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: tsumugi, x: 0.76, tag: "風美子"}
    cuts:
      - speaker: reimu
        text: "はじめの試作は、単純な仕組みでした。"
        reading: "はじめのしさくわ、たんじゅんなしくみでした。"
      - speaker: zundamon
        emotion: normal
        text: "時計をつけて、20分たったら電気を切る。チュートリアルだ。"
      - speaker: tsumugi
        emotion: normal
        text: "それなら、簡単そうだけど。"
      - speaker: zundamon
        emotion: normal
        text: "冬の朝に試すぞ。……スイッチ、オン。"
      - speaker: tsumugi
        emotion: sad
        text: "20分後。……あら、まだ芯が残ってる。"
      - speaker: zundamon
        emotion: sad
        text: "水が冷たいと、20分じゃ足りないんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "じゃあ、夏は？"
      - speaker: zundamon
        emotion: sad
        text: "同じ20分で……今度は、真っ黒に焦げる。オワタ。"
      - speaker: tsumugi
        emotion: normal
        text: "時計だけじゃ、季節に負けるのね。"
      - speaker: zundamon
        emotion: thinking
        text: "「何分」で止めるのが、そもそも間違いなのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "時間じゃなくて、ごはんの状態で止めないと。"
      - speaker: zundamon
        emotion: sad
        text: "でも、機械は、ごはんの中身を見られないんだ……。"
      - speaker: reimu
        text: "時間で計る発想は、ことごとく壁にぶつかりました。"
        reading: "じかんではかるはっそうわ、ことごとくかべにぶつかりました。"
      - speaker: zundamon
        emotion: sad
        text: "何度やっても、焦げるか、生煮え。無理ゲーかよ。"
      - speaker: tsumugi
        emotion: normal
        text: "大手が諦めた壁が、目の前にあるのね。"
      - speaker: zundamon
        emotion: normal
        text: "でも、越えられない壁じゃないはずだ。"
  - id: kome
    title: "家を、担保に"
    background: il_rc_home
    bgm: kinakusai
    stage:
      - {who: zundamon, x: 0.24, tag: "三並", flip: true}
      - {who: tsumugi, x: 0.76, tag: "風美子"}
    cuts:
      - speaker: reimu
        text: "実験を続けるうち、家の米が底をつきました。"
        reading: "じっけんをつづけるうち、いえのこめがそこをつきました。"
      - speaker: tsumugi
        emotion: sad
        text: "あなた……お米、もう、ないの。"
      - speaker: zundamon
        emotion: thinking
        text: "実験には、まだまだ要るんだ。何百回ぶんも。"
      - speaker: tsumugi
        emotion: sad
        text: "でも、うちにそんなお金……。"
      - speaker: zundamon
        emotion: normal
        text: "……工場と、この家を、担保に入れるのだ。"
      - speaker: tsumugi
        emotion: surprised
        text: "家を！？失敗したら、住むところも無くなるのよ。"
      - speaker: zundamon
        emotion: normal
        text: "承知なのだ。でも、ここでやめたら、ぜんぶ無駄になるんだ。"
      - speaker: tsumugi
        emotion: normal
        text: "……分かったわ。とことん、やりましょう。"
      - speaker: reimu
        text: "夫婦は自宅と工場を担保に借金し、1トン以上の米を買いました。"
        reading: "ふうふわじたくとこうじょうをたんぽにしゃっきんし、いっとんいじょうのこめをかいました。"
      - speaker: zundamon
        emotion: normal
        text: "台所じゅう、米俵だらけだ。"
      - speaker: tsumugi
        emotion: normal
        text: "この1粒ずつが、主婦の朝につながってる。"
      - speaker: zundamon
        emotion: normal
