# battery-80 の掛け合い実験版（春日部つむぎ=解説の先生 / ずんだもん=ちょっとアホな生徒）。
# ずんだもんの語尾は必ず「〜なのだ」「〜のだ」。一人称はボク。つむぎの一人称はあーし。
# 素材（アニメ・実写クリップ・背景）は battery-80 と共用。
meta:
  title: "スマホ充電100%は損！80%の科学【ずんだもん解説】"
  slug: "battery-80-duo"
  summary: "毎晩100%まで充電して寝ているずんだもんに、春日部つむぎが衝撃の事実を突きつけます。スマホメーカー自身が80%で充電を止める機能を作る理由と、リチウムイオン電池が劣化する仕組み、今日からできる正しい電池ケアを掛け合いで解説。"
  tags: ["スマホ", "バッテリー", "充電", "科学", "ずんだもん", "春日部つむぎ"]
  thumbnail:
    top: "満タンは損してる"
    bottom: "80%の科学"
scenes:
  - id: hook
    title: ""
    background: m_77e72ca3
    short: true
    cuts:
      # ---- 茶番パート（大事な時に電池切れ）----
      - speaker: zundamon
        emotion: happy
        text: "きたのだ！推しの生配信が始まる時間なのだ！この5分のために今日を生きてきたのだ！"
        video: assets/clips/batt_dead.mp4
        video_span: 3
        video_full: true
      - speaker: zundamon
        emotion: surprised
        text: "……あれ？画面が真っ暗になったのだ。おーい、なのだ？"
      - speaker: zundamon
        emotion: angry
        text: "電池切れなのだ！？さっきまで30%あったはずなのだ！このスマホ、まだ2年目なのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "あー、それは電池がヘタってるね。というかずんだもん、毎晩スマホを100%まで充電して寝てるでしょ。"
      - speaker: zundamon
        emotion: surprised
        text: "なんで分かったのだ。完璧な充電管理なのだ。むしろ褒めてほしいのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "その完璧な習慣こそが、電池の寿命を縮めた犯人だとしたら、どうする？"
      - speaker: zundamon
        emotion: surprised
        text: "……え？"
      # ---- フック ----
      - speaker: zundamon
        emotion: angry
        text: "ボクの毎晩の100%充電が悪いっていうのだ！？満タンは正義なのだ！"
        video: assets/clips/hook_gauge.mp4
        video_span: 2
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "実はその満タンが電池の寿命をどんどん削ってて、良かれと思ってやってることで、いちばん損しちゃってるんだよ。"
        telops:
          - {text: "満タンが寿命を削る", size: xl, position: bottom-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
      - speaker: tsumugi
        emotion: normal
        text: "しかもスマホメーカー自身が、80%で充電を止める機能をわざわざ作ってるの。満タンにできるのにさせたくないなんて、おかしいと思わない？"
        slide:
          title: "今日のテーマ"
          big: "充電は80%で止めるべき？"
      - speaker: zundamon
        emotion: thinking
        text: "言われてみれば謎なのだ。メーカーが自分の機能を封じてるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "今日はこの80%論争に、電池の科学で決着をつけるよ。最後まで見ないと、ずんだもんは今夜もまた電池を削りながら眠ることになるからね。"
        telops:
          - {text: "今日で決着", size: lg, position: bottom-center, color: "#FFFFFF", stroke: "#0A1E3C", glow: "#2288EE", anim: up}
  - id: chapter1
    title: "電池の敵は満タンと熱"
    background: m_07a487b7
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "まず敵を知ろっか。ずんだもん、スマホの中の[リチウムイオン電池|リチウムイオンでんち]がどう動いてるか、説明できる？"
      - speaker: zundamon
        emotion: happy
        text: "任せるのだ。コンセントから電気のつぶが流れてきて、中の箱にたまっていくのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "惜しい、半分だけ正解だよ。それじゃあ、図を見ながらゆっくり説明していくね。"
      - speaker: tsumugi
        emotion: normal
        text: "電池の中には、プラス側の[正極|せいきょく]とマイナス側の[負極|ふきょく]という2つの部屋があって、その間はイオンが移動できる液体で満たされてるの。"
        video: assets/clips/battery_anim_duo.mp4
        video_span: 8
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "電気をためる主役はリチウムイオンっていう小さな粒で、電池が[空|から]のときは、プラス側の部屋にいるんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "充電というのは、この粒を電気の力でマイナス側の部屋へ押し込んでいく作業のことだよ。"
      - speaker: zundamon
        emotion: thinking
        text: "粒を反対側に集めるだけで、電気をためたことになるのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "そうだよ。スマホを使うときは粒がプラス側へ戻っていって、その流れがそのまま電気になるから、ためた粒が多いほど長く使えるってわけね。"
      - speaker: zundamon
        emotion: normal
        text: "なるほどなのだ。じゃあ満タンは、粒が全部マイナス側に詰まった状態なのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "その通りだよ。そしてここからが本題なんだけど、実はその満タン状態が、電池にとっていちばん苦しい状態なの。"
      - speaker: tsumugi
        emotion: normal
        text: "満タンの間は粒がぎゅうぎゅうに詰まったまま高い電圧がかかり続けるから、中では余計な化学反応がじわじわ進んでいくの。"
      - speaker: tsumugi
        emotion: normal
        text: "その反応で部品の表面にゴミみたいな膜がたまって、イオンの通り道がどんどん塞がれていくの。これが劣化の正体のひとつと言われてるよ。"
        slide:
          title: "劣化の正体"
          bullets:
            - "満充電は電池に高い電圧"
            - "内部で余計な反応が進む"
            - "イオンの通り道が減っていく"
      - speaker: zundamon
        emotion: thinking
        text: "通り道が塞がれたら、ためられる粒も減るのだ。だから古いスマホは電池がヘタるのだ。"
      - speaker: tsumugi
        emotion: normal
        background: m_092e4238
        text: "そして、満タンと並ぶもう一人の犯人が、熱だよ。"
        video: assets/clips/heat_flame.mp4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "化学反応は温度が上がるほど速く進むから、劣化も同じように速くなっていくの。単純な話だよ。"
        telops:
          - {text: "敵は満タンと熱", size: xl, position: bottom-center, color: "#FFFFFF", stroke: "#3A0A0A", glow: "#EE3322", anim: up}
      - speaker: zundamon
        emotion: sad
        text: "満タンのまま熱い場所に放置が、最悪の組み合わせなのだ。ボク、枕の下で充電しながら寝てたのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "それ、電池に悪いことを全部同時にやってるからね。2年でヘタったスマホの犯人は使いすぎじゃなくて毎晩の充電習慣、つまり、ずんだもん自身だよ。"
        video: assets/clips/settings_tap.mp4
        video_full: true
        video_speed: 0.85
  - id: chapter2
    title: "80%に科学的な根拠はあるのか"
    background: m_37e7bbee
    cuts:
      - speaker: zundamon
        emotion: angry
        text: "でも80%って、キリがいいだけの数字な気もするのだ。ボクは騙されないのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "お、いい疑い方じゃん。じゃあその疑いに、研究のデータで答えるね。"
      - speaker: tsumugi
        emotion: normal
        text: "電池の研究では、充電状態が高いほど、そして温度が高いほど劣化が速いという傾向が、嫌というほど繰り返し報告されてるの。"
        slide:
          title: "研究で知られる傾向"
          bullets:
            - "高い充電状態ほど劣化が速い"
            - "高温で劣化はさらに加速"
            - "中間の充電が最も穏やか"
      - speaker: tsumugi
        emotion: normal
        text: "たとえば100%のまま置いた電池は、40%で置いた場合より容量の減りがずっと速いと言われていて、使っていなくてもそうなるんだよ。"
        video: assets/clips/graph_decay.mp4
        video_span: 3
        video_full: true
      - speaker: zundamon
        emotion: surprised
        text: "置いてあるだけで減るのだ！？サボってるのに疲れるタイプなのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "しかも0から100まで使い切るより、20から80の範囲で使うほうが、寿命が数倍延びたって報告まであるんだよ。"
      - speaker: tsumugi
        emotion: normal
        background: m_aeac6565
        text: "電池のかたまりである電気自動車の世界だと、普段は80%までがメーカー公認の常識になりつつあるんだよね。"
        video: assets/clips/ev_charge.mp4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "だからスマホメーカーは、わざわざ上限80%で止める機能を作ったんだよ。"
        stat: {value: 80, unit: "%", label: "多くのスマホが搭載する充電上限"}
      - speaker: tsumugi
        emotion: normal
        text: "iPhoneなら充電上限、Androidならいたわり充電と、名前は違っても思想は全部同じなんだよ。"
        video: assets/clips/toggle_80.mp4
        video_full: true
      - speaker: zundamon
        emotion: normal
        text: "80%は思いつきじゃなくて、電池の性質から出てきた数字だったのだ。知らなかったのは、ボクたちだけなのだ。"
        telops:
          - {text: "80%は科学", size: lg, position: bottom-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
  - id: history
    title: "その電池、誰が作った？"
    background: m_07a487b7
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "ところでずんだもん、そのスマホの電池、いつ誰が発明したか知ってる？"
      - speaker: zundamon
        emotion: thinking
        text: "考えたこともなかったのだ。スマホと一緒に生まれたんじゃないのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "実は50年がかりの発明で、これがドラマみたいな話なんだよ。少しだけ寄り道して紹介するね。"
      - speaker: tsumugi
        emotion: normal
        text: "時は1970年代。世界はオイルショックの真っただ中だよ。"
        video: assets/clips/oil_pump.mp4
        video_span: 2
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "石油の値段が跳ね上がって世界中が大混乱して、石油に頼りすぎた代償にみんなが気づいたの。"
      - speaker: tsumugi
        emotion: normal
        text: "そこで動いたのが、意外な会社。世界最大級の石油会社、エクソンだよ。"
        video: assets/clips/era_1970.mp4
        video_span: 3
        video_full: true
      - speaker: zundamon
        emotion: surprised
        text: "石油の会社が、石油に代わるものを研究したのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "石油はいつか尽きるから、その前に次のエネルギーを押さえておこうというわけ。そこで雇われた若い化学者が、ウィッティンガムだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "彼は世界で初めて、充電できるリチウム電池を作ることに成功して、ここまでは順調だったの。"
      - speaker: zundamon
        emotion: happy
        text: "めでたしめでたしなのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "ところが、この電池には致命的な欠点があったの。"
      - speaker: tsumugi
        emotion: normal
        text: "充電を繰り返すと中の金属から細いトゲが伸びてきて、それが反対側に届くとショートして発火しちゃうの。"
        video: assets/clips/explosion_fire.mp4
        video_span: 2
        video_full: true
      - speaker: zundamon
        emotion: surprised
        text: "燃えたのだ！？"
      - speaker: tsumugi
        emotion: normal
        text: "実験室では火事が何度も起きたと言われていて、しかも石油の値段が落ち着くと、エクソンは研究から手を引いちゃったの。"
      - speaker: zundamon
        emotion: sad
        text: "開発中止……。はしごを外されたのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "ここで2人目の登場。イギリスのオックスフォード大学にいた、グッドイナフ教授だよ。"
        video: assets/clips/era_1980.mp4
        video_span: 4
        video_full: true
      - speaker: tsumugi
        emotion: happy
        text: "名前の意味は、十分に良い。その名前のとおりに、十分すぎる仕事をするんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "1980年、電池の材料をコバルト酸リチウムに変えて、電圧をそれまでの倍近くまで引き上げたんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "しかもこの研究、東芝から留学していた日本人、[水島公一|みずしまこういち]さんとの共同研究なの。"
      - speaker: zundamon
        emotion: happy
        text: "日本人も混ざってたのだ！ちょっと誇らしいのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "でも、まだ発火の問題が残ってるよね。そこで3人目に登場するのが、日本の[吉野彰|よしのあきら]さん、[旭化成|あさひかせい]の研究者だよ。"
        video: assets/clips/era_1985.mp4
        video_span: 4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "吉野さんは、爆発の原因だった金属のリチウムをやめて、イオンを炭素の隙間にしまう方式を考えついたの。"
      - speaker: tsumugi
        emotion: normal
        text: "粒が炭素の中に出たり入ったりするだけだから、トゲが伸びなくて燃えにくいの。"
      - speaker: zundamon
        emotion: surprised
        text: "それ、さっき勉強した仕組みそのものなのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "そう。ずんだもんのスマホの中身は吉野さんの発明がほぼそのまま入ってるんだよ。1985年に、その基本の形が完成したの。"
      - speaker: tsumugi
        emotion: normal
        text: "そして1991年、ソニーが世界で初めてこの電池を商品化して、最初に載ったのはビデオカメラだったんだよ。"
        video: assets/clips/camcorder.mp4
        video_full: true
        video_speed: 0.85
      - speaker: zundamon
        emotion: thinking
        text: "スマホじゃなくて、ビデオカメラが最初だったのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "ここから携帯電話、ノートパソコン、スマホ、電気自動車と広がっていって、世界はこの電池で動くようになったの。"
        video: assets/clips/era_1991.mp4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "そして2019年、この3人にノーベル化学賞が贈られたんだよ。"
        video: assets/clips/era_2019.mp4
        video_span: 4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        text: "このときグッドイナフさんは97歳で、史上最高齢の受賞だったんだよ。"
        stat: {value: 97, unit: "歳", label: "史上最高齢のノーベル賞受賞"}
      - speaker: zundamon
        emotion: surprised
        text: "97歳なのだ！？"
      - speaker: tsumugi
        emotion: normal
        text: "電圧を倍にする発見をしたのが57歳のときで、そこから40年、100歳で亡くなる直前まで現役の研究者だったの。"
      - speaker: zundamon
        emotion: happy
        text: "遅すぎるスタートなんて無いのだ。ボクも今から偉くなれるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "ノーベル賞の授賞理由がまたかっこいいんだよ。彼らは、充電できる世界を作った。"
        telops:
          - {text: "充電できる世界を作った", size: xl, position: bottom-center, color: "#FFF15A", stroke: "#3A2A00", glow: "#FFAA00", anim: up}
      - speaker: zundamon
        emotion: thinking
        text: "ボクが毎晩寿命を削ってたのは、そんな大発明だったのだ……。反省なのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "歴史に敬意を払ったところで話を戻して、この大発明を長持ちさせる使い方の話、いってみよう。"
  - id: chapter3
    title: "で、結局どうすればいい？"
    background: m_38782c86
    cuts:
      - speaker: zundamon
        emotion: happy
        text: "分かったのだ！今日から1%の誤差も許さず、80%ぴったりで止めるのだ！"
      - speaker: tsumugi
        emotion: normal
        text: "そこまでしなくても大丈夫だよ。今のスマホは賢くて、電池を守る仕組みが最初から入ってるからね。"
        slide:
          title: "スマホが勝手にやってくれること"
          bullets:
            - "満充電後は流入を抑える"
            - "就寝中は満タン到達を遅らせる"
            - "温度を常に監視している"
      - speaker: tsumugi
        emotion: normal
        background: m_c49925f5
        text: "たとえば最適化充電は、ずんだもんの起床時間を学習して、夜の間は80%で止めておいて、起きる直前に100%まで仕上げてくれる機能だから、夜中の満タン放置がこれだけでなくなるの。"
        video: assets/clips/sleep_phone.mp4
        video_full: true
      - speaker: zundamon
        emotion: surprised
        text: "ボクが寝てる間に、そこまで考えて動いてたのだ。ボクより偉いのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "その上で、人間が意識することは3つだけだよ。ずんだもん、メモの準備はいい？"
        video: assets/clips/care_checklist.mp4
        video_full: true
      - speaker: tsumugi
        emotion: normal
        background: m_802775f3
        text: "特に夏の車内への放置は電池を火であぶってるのと同じだから、熱だけは絶対に避けてね。"
        video: assets/clips/hot_car.mp4
        video_full: true
        telops:
          - {text: "熱だけは避けて", size: lg, position: bottom-center, color: "#FFFFFF", stroke: "#3A1A00", glow: "#FF6622", anim: up}
      - speaker: tsumugi
        emotion: normal
        text: "ワイヤレス充電も弱点は熱だから、ケースが熱いなと思ったら外して充電するだけでも、だいぶ違うよ。"
        video: assets/clips/wireless_charge.mp4
        video_full: true
      - speaker: zundamon
        emotion: thinking
        text: "じゃあ旅行の日はどうするのだ？80%だと電池が足りなくて不安なのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "たまの100%は全然OKだよ。旅行の日は遠慮なく満タンにしていいからね。"
        telops:
          - {text: "たまの100%はOK", size: md, position: bottom-center, color: "#9FFFC8", stroke: "#073A1E", glow: "#33DD77", anim: fade}
      - speaker: tsumugi
        emotion: normal
        text: "そもそも電池は消耗品で、2〜3年使って弱ったら交換すればいいんだから、完璧主義はいらないからね。"
  - id: beyond
    title: "スマホの外でも、80%"
    background: m_aeac6565
    cuts:
      - speaker: tsumugi
        emotion: normal
        text: "ここまでスマホの話をしてきたけど、この電池との付き合い方、実はもっと大きな世界の常識なんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "電気自動車が普段は80%までなのはもう話したけど、電池が大きくて高価になるほど、みんな満タンを避けるようになるんだよ。"
      - speaker: tsumugi
        emotion: normal
        text: "飛行機もそうだよ。モバイルバッテリーがスーツケースに入れられないの、知ってる？"
