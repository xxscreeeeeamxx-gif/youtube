      - speaker: tsumugi
        emotion: normal
        text: "安心して、電池の側もちゃんと進化してるよ。そもそも燃える大元の原因は、中を満たしてる電解液が燃えやすい液体だってことだったよね。"
      - speaker: tsumugi
        emotion: normal
        text: "だったらその液体を燃えにくいゲルに変えちゃおう、というのが半固体電池。すでに発火リスクを抑えたモバイルバッテリーとして、日本でも発売されてるんだよ。"
        slide:
