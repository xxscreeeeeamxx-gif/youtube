      - speaker: tsumugi
        emotion: normal
        text: "さらに液体を完全な固体にした全固体電池は、電気自動車向けに日本のメーカーが開発競争の真っ最中で、完成すればもっと安全で長持ちする電池になると言われてるよ。"
      - speaker: tsumugi
        emotion: normal
        text: "最後にすごい話をひとつ。実は国際宇宙ステーションの電池もリチウムイオン電池で、しかも日本のメーカー製なんだよ。"
