# 胃カメラ再現ドラマ（宇治達郎×杉浦睦夫・1949→現代）。投稿前に必ず目視レビュー。
# 裏取りはビルダーdocstring参照（オリンパス内視鏡ミュージアム/杉浦睦夫Wikipedia/
# ikamera.jp/イノベーション100選/神プロジェクト記事）
meta:
  title: "胃の中を撮れ。電車で口説かれた技師と医師の、見えないものを見る挑戦【胃カメラ誕生・ゆっくり再現ドラマ】"
  slug: "gastro-camera"
  summary: "胃カメラを発明した外科医・宇治達郎とカメラ技師・杉浦睦夫の物語。お腹を開けるまで胃の中が見えなかった時代、宇治は夜行列車で杉浦を口説き落とす。米粒より小さい電球を8か月かけて巻いた職人、暗い部屋で偶然見つけた皮膚を透ける光、自分の胃で試す人体実験。世界初の胃カメラ誕生から、電子内視鏡による胃がん早期発見まで、ずんだもんが宇治を、つむぎが杉浦を演じる再現ドラマでお届けします。"
  tags: ["胃カメラ", "内視鏡", "宇治達郎", "杉浦睦夫", "オリンパス", "再現ドラマ", "ゆっくり", "ずんだもん"]
  thumbnail:
    top: "胃の中を撮れ"
    bottom: "電車で始まった挑戦"
  mode: drama
  narrator: reimu
  mobs:
    - {id: senpai, label: "先輩医師", voice: 13, pitch: -0.06, item: mustache}
    - {id: fukami, label: "深海技師", voice: 13, pitch: 0.02, hair: short}
    - {id: maruyama, label: "電球職人", voice: 12, hair: short}
    - {id: imai, label: "助手", voice: 12, pitch: 0.04, hair: short}
    - {id: sakamoto, label: "坂本医師", voice: 42, item: mustache}
    - {id: isha_b, label: "学会の医師", voice: 13, pitch: -0.08, item: hat}
scenes:
  - id: hook
    title: ""
    background: il_gc_clinic
    bgm: shuffle_shuffle
    stage:
      - {who: zundamon, x: 0.3, flip: true}
      - {who: tsumugi, x: 0.74}
    cuts:
      - speaker: zundamon
        emotion: sad
        text: "検診の日なのだ。今日は、胃カメラなのだ……。"
      - speaker: tsumugi
        emotion: normal
        text: "緊張してるね。"
      - speaker: zundamon
        emotion: sad
        text: "細い管を、飲むのだ。想像しただけで、おえってなるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "最近のは鼻から入る細いのもあるし、眠ってる間に終わるのもあるよ。"
      - speaker: zundamon
        emotion: sad
        text: "それでも、こわいものはこわいのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "でもね、これのおかげで、小さな胃がんが見つかるんだよ。"
      - speaker: zundamon
        emotion: thinking
        text: "……見つかれば、助かるのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "早ければ、ね。昔は胃の中なんて、開けてみるまで分からなかった。"
      - speaker: zundamon
        emotion: thinking
        text: "お腹を開けてから、じゃ遅いこともあるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "そう。その常識をひっくり返したのが、この胃カメラ。"
      - speaker: zundamon
        emotion: thinking
        text: "誰が作ったのだ？大きな会社の、大勢の研究者？"
      - speaker: tsumugi
        emotion: normal
        text: "町医者になった外科医と、カメラ会社の技師。"
      - speaker: zundamon
        emotion: surprised
        text: "たった2人！？"
      - speaker: tsumugi
        emotion: happy
        text: "電車の中で口説かれて、始まったんだよ。"
      - speaker: zundamon
        emotion: surprised
        text: "口説く……胃カメラを！？"
      - speaker: tsumugi
        emotion: happy
        text: "今日はその話。管を飲む前に、聞いていこう。"
      - speaker: zundamon
        emotion: normal
        text: "こわいの、まぎれるのだ。お願いなのだ。"
      - speaker: reimu
        text: "胃カメラ。日本で生まれ、世界の胃がん検診を変えた発明です。"
        reading: "いかめら。にほんでうまれ、せかいのいがんけんしんをかえたはつめいです。"
      - speaker: reimu
        text: "作ったのは、1人の医師と、1人のカメラ技師でした。"
        reading: "つくったのわ、ひとりのいしと、ひとりのかめらぎしでした。"
      - speaker: reimu
        text: "物語は、1949年の東京から始まります。"
        reading: "ものがたりわ、せんきゅうひゃくよんじゅうきゅうねんのとうきょうからはじまります。"
  - id: era1949
    title: "1949・胃の中は、闇だった"
    background: il_gc_hospital
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.15, tag: "宇治", flip: true}
    cuts:
      - speaker: reimu
        text: "1949年、東京。"
        reading: "せんきゅうひゃくよんじゅうきゅうねん、とうきょう。"
        video: assets/clips/era_g1949.mp4
        video_full: true
        pause_after: 0.8
  - id: hospital
    title: ""
    background: il_gc_hospital
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.24, tag: "宇治", flip: true}
      - {who: senpai, x: 0.72}
    cuts:
      - speaker: reimu
        text: "宇治達郎は、東京大学分院の外科医でした。"
        reading: "うじたつろうわ、とうきょうだいがくぶんいんのげかいでした。"
      - speaker: senpai
        text: "宇治くん、今日の患者さんだ。胃の調子が悪いと。"
      - speaker: zundamon
        emotion: thinking
        text: "レントゲンでは、影があるとしか分からないのだ。"
      - speaker: senpai
        text: "胃鏡を飲んでもらうか。……患者さんは、嫌がるだろうな。"
      - speaker: zundamon
        emotion: sad
        text: "硬い金属の管なのだ。苦しくて、途中で断念する人も多いのだ。"
      - speaker: senpai
        text: "結局、開腹して直接見るしかない。"
      - speaker: zundamon
        emotion: sad
        text: "でも、お腹を開けたときには……。"
      - speaker: senpai
        text: "手遅れのことも、ある。"
      - speaker: reimu
        text: "胃の中を、生きたまま見る方法がない。それが当時の壁でした。"
        reading: "いのなかを、いきたままみるほうほうがない。それがとうじのかべでした。"
      - speaker: zundamon
        emotion: thinking
        text: "お腹を開けずに、胃の中を見られたら……。"
      - speaker: zundamon
        emotion: normal
        text: "手遅れになる前に、助けられる人がいるのだ。"
      - speaker: senpai
        text: "宇治くん、それは医者みんなの夢だよ。"
      - speaker: reimu
        text: "この日の患者は、半年後に亡くなりました。"
        reading: "このひのかんじゃわ、はんとしごになくなりました。"
      - speaker: zundamon
        emotion: sad
        text: "もっと早く、胃の中が見えていれば。"
      - speaker: zundamon
        emotion: sad
        text: "レントゲンの影が、影のままなのが悔しいのだ。"
      - speaker: senpai
        text: "医者の限界だ。受け入れるしかない。"
      - speaker: zundamon
        emotion: normal
        text: "受け入れたくないのだ。道具がないなら、作ればいいのだ。"
      - speaker: senpai
        text: "作る、って。医者が、カメラをかね。"
      - speaker: zundamon
        emotion: normal
        text: "夢で終わらせたくないのだ。"
  - id: soudan
    title: "カメラの相談"
    background: il_gc_lab
    bgm: pastel_house
    stage:
      - {who: zundamon, x: 0.24, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.76, tag: "杉浦"}
    cuts:
      - speaker: reimu
        text: "ある日、宇治はカメラ会社、オリンパスの門を叩きます。"
        reading: "あるひ、うじわかめらがいしゃ、おりんぱすのもんをたたきます。"
      - speaker: zundamon
        emotion: normal
        text: "突然すみません。カメラの相談があるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "はい、技師の杉浦です。どんなカメラを？"
      - speaker: zundamon
        emotion: normal
        text: "……胃の中を、撮るカメラなのだ。"
      - speaker: tsumugi
        emotion: surprised
        text: "胃の、中を、ですか。"
      - speaker: zundamon
        emotion: normal
        text: "人間の、[お腹の中|おなかのなか]なのだ。無茶を言ってるのは分かってるのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "……ふむ。"
      - speaker: zundamon
        emotion: sad
        text: "やっぱり、無理なのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "いえ。光があって、レンズがあって、フィルムがあれば。"
      - speaker: tsumugi
        emotion: normal
        text: "カメラは、どこにあっても写せます。"
      - speaker: zundamon
        emotion: surprised
        text: "……胃の中でも？"
      - speaker: tsumugi
        emotion: normal
        text: "理屈の上では、胃の中でも。"
      - speaker: zundamon
        emotion: happy
        text: "できるかもしれないのだ！？"
      - speaker: tsumugi
        emotion: thinking
        text: "理屈の上では、ですよ。作るのは、別の話です。"
      - speaker: zundamon
        emotion: thinking
        text: "どれくらい、小さくできるのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "うちの一番小さいカメラで、手のひらサイズ。"
      - speaker: zundamon
        emotion: normal
        text: "喉を通すには、指の太さにしたいのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "……手のひらを、指先に。正気の注文じゃないですね。"
      - speaker: zundamon
        emotion: sad
        text: "正気じゃないのは、分かってるのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "でも、嫌いじゃないですよ。そういう無茶。"
      - speaker: reimu
        text: "技師の名は、杉浦睦夫。カメラひとすじの職人でした。"
        reading: "ぎしのなわ、すぎうらむつお。かめらひとすじのしょくにんでした。"
  - id: train
    title: "夜行列車の口説き"
    background: il_gc_train
    bgm: you_and_me
    stage:
      - {who: zundamon, x: 0.24, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.76, tag: "杉浦"}
    cuts:
      - speaker: reimu
        text: "その帰り道。2人はたまたま、同じ夜行列車に乗り合わせます。"
        reading: "そのかえりみち。ふたりわたまたま、おなじやこうれっしゃにのりあわせます。"
      - speaker: tsumugi
        emotion: normal
        text: "奇遇ですね、先生。お帰りも同じ方向とは。"
      - speaker: zundamon
        emotion: normal
        text: "杉浦さん。さっきの話、もう少し聞いてほしいのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "はあ。まだ胃の中の話ですか。"
      - speaker: zundamon
        emotion: normal
        text: "毎日、患者さんが胃の病気で亡くなっていくのだ。"
      - speaker: zundamon
        emotion: normal
        text: "見えないから、手遅れになるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "……それは、お辛いでしょうね。"
      - speaker: zundamon
        emotion: normal
        text: "胃の中が[見|み]えれば、小さいうちに見つけられるのだ。"
      - speaker: zundamon
        emotion: normal
        text: "何十人、何百人が、助かるのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "先生、私はカメラ屋です。医者じゃない。"
      - speaker: zundamon
        emotion: normal
        text: "だから、頼んでるのだ。カメラは、杉浦さんにしか作れないのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "……。"
      - speaker: zundamon
        emotion: normal
        text: "一緒に、作ってほしいのだ。この通りなのだ。"
      - speaker: tsumugi
        emotion: surprised
        text: "頭を下げないでください。乗客が見てます。"
      - speaker: zundamon
        emotion: normal
        text: "乗り過ごしてもいいから、うんと言ってほしいのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "……ひとつだけ、聞かせてください。"
      - speaker: tsumugi
        emotion: normal
        text: "それ、儲かりますか。"
      - speaker: zundamon
        emotion: normal
        text: "たぶん、儲からないのだ。でも、人が助かるのだ。"
      - speaker: tsumugi
        emotion: happy
        text: "……ふっ。技師をくどくのが、うますぎます。"
      - speaker: zundamon
        emotion: happy
        text: "やってくれるのだ！？"
      - speaker: tsumugi
        emotion: happy
        text: "やりましょう。面白くなってきました。"
      - speaker: reimu
        text: "熱意にほだされ、カメラ技師は無謀な挑戦に乗りました。"
        reading: "ねついにほだされ、かめらぎしわむぼうなちょうせんにのりました。"
  - id: mokuhyou
    title: "4つの目標"
    background: il_gc_lab
    bgm: curious
    stage:
      - {who: zundamon, x: 0.22, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.54, tag: "杉浦"}
      - {who: fukami, x: 0.86}
    cuts:
      - speaker: reimu
        text: "2人はまず、作るべきカメラの条件を決めました。"
        reading: "ふたりわまず、つくるべきかめらのじょうけんをきめました。"
      - speaker: zundamon
        emotion: normal
        text: "ひとつ。危険がないこと。"
      - speaker: tsumugi
        emotion: normal
        text: "体の中に入れるんです。何より大事です。"
      - speaker: zundamon
        emotion: normal
        text: "ふたつ。患者さんに、苦痛を与えないこと。"
      - speaker: tsumugi
        emotion: normal
        text: "硬い管はだめ。柔らかく、細く。"
      - speaker: zundamon
        emotion: normal
        text: "みっつ。胃の中ぜんぶを、短い時間で撮れること。"
      - speaker: tsumugi
        emotion: normal
        text: "長く入れておくほど、苦しいですからね。"
      - speaker: zundamon
        emotion: normal
        text: "よっつ。病気を見分けられる、鮮明な写真。"
      - speaker: tsumugi
        emotion: normal
        text: "ぼやけていたら、意味がない。"
  - id: mokuhyou_clip
    title: ""
    background: il_gc_lab
    bgm: curious
    stage:
      - {who: zundamon, x: 0.15, tag: "宇治", flip: true}
    cuts:
      - speaker: reimu
        text: "危険がない。苦しくない。速い。鮮明。この4つが羅針盤でした。"
        reading: "きけんがない。くるしくない。はやい。せんめい。このよっつがらしんばんでした。"
        video: assets/clips/gc_mokuhyou.mp4
        video_span: 4
        video_full: true
  - id: mokuhyou2
    title: ""
    background: il_gc_lab
    bgm: curious
    stage:
      - {who: zundamon, x: 0.22, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.54, tag: "杉浦"}
      - {who: fukami, x: 0.86}
    cuts:
      - speaker: zundamon
        emotion: normal
        text: "全部そろって、はじめて胃カメラなのだ。"
      - speaker: tsumugi
        emotion: thinking
        text: "……先生、これ、全部むずかしいやつですよ。"
      - speaker: zundamon
        emotion: happy
        text: "むずかしいから、まだ誰も作れてないのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "もう1人、腕のいい技師を呼びます。深海というやつを。"
      - speaker: fukami
        emotion: normal
        text: "深海です。前は、戦闘機の精密機械をやってました。"
      - speaker: zundamon
        emotion: thinking
        text: "戦闘機の技術者が、なぜ胃カメラを？"
      - speaker: fukami
        text: "人を撃つ機械の次は、人を助ける機械を作りたくて。"
      - speaker: zundamon
        emotion: happy
        text: "……いい動機なのだ。よろしく頼むのだ。"
      - speaker: fukami
        text: "指先のカメラ、必ず動かします。"
      - speaker: reimu
        text: "技師の深海正治も加わり、開発は動き出します。"
        reading: "ぎしのふかみまさじもくわわり、かいはつわうごきだします。"
  - id: kan
    title: ""
    background: il_gc_workshop
    bgm: 223am
    stage:
      - {who: zundamon, x: 0.24, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.56, tag: "杉浦"}
      - {who: fukami, x: 0.86}
    cuts:
      - speaker: reimu
        text: "壁は、次々に立ちはだかりました。"
        reading: "かべわ、つぎつぎにたちはだかりました。"
      - speaker: tsumugi
        emotion: normal
        text: "まず、管です。硬いと喉を通らない。柔らかいと、中で潰れる。"
      - speaker: fukami
        text: "ゴムを何種類も取り寄せました。曲がって、潰れない太さを探します。"
      - speaker: zundamon
        emotion: surprised
        text: "その細い管の先に、カメラを丸ごと仕込むのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "レンズも、フィルムも、光源も。指先ほどの中に全部です。"
      - speaker: fukami
        text: "35ミリカメラを、豆粒まで小さくするようなものです。"
      - speaker: zundamon
        emotion: thinking
        text: "……気が遠くなるのだ。"
      - speaker: tsumugi
        emotion: normal
        text: "先生は胃のことだけ考えてください。機械はこっちの仕事です。"
      - speaker: zundamon
        emotion: normal
        text: "頼もしいのだ。ボクは、胃の形と角度を図にするのだ。"
      - speaker: reimu
        text: "医師は体の知識を、技師は機械の腕を持ち寄りました。"
        reading: "いしわからだのちしきを、ぎしわきかいのうでをもちよりました。"
  - id: denkyu
    title: "米粒の光"
    background: il_gc_workshop
    bgm: 10do
    stage:
      - {who: zundamon, x: 0.22, tag: "宇治", flip: true}
      - {who: tsumugi, x: 0.54, tag: "杉浦"}
      - {who: maruyama, x: 0.86}
    cuts:
      - speaker: reimu
        text: "とりわけ苦しんだのが、胃を照らす光でした。"
        reading: "とりわけくるしんだのが、いをてらすひかりでした。"
      - speaker: tsumugi
        emotion: normal
        text: "胃の中は、真っ暗です。豆電球で照らすしかない。"
      - speaker: zundamon
        emotion: thinking
        text: "そんな小さい電球、売ってるのだ？"
      - speaker: tsumugi
        emotion: normal
        text: "どこにも売ってません。だから、作ります。"
      - speaker: maruyama
        text: "電球職人の、丸山です。23歳、やらせてください。"
      - speaker: zundamon
        emotion: surprised
        text: "若いのだ！大丈夫なのだ？"
      - speaker: maruyama
        text: "米粒より小さい電球なんて、誰も作ったことがない。"
      - speaker: maruyama
        text: "……だから、燃えるんです。"
      - speaker: zundamon
        emotion: happy
        text: "その意気なのだ！"
      - speaker: reimu
        text: "小さすぎる電球は、すぐ切れ、熱を持ちました。"
        reading: "ちいさすぎるでんきゅうわ、すぐきれ、ねつをもちました。"
      - speaker: maruyama
        text: "また切れました。……フィラメントが、細すぎて。"
      - speaker: zundamon
        emotion: thinking
        text: "熱すぎると、胃を傷つけてしまうのだ。"
      - speaker: maruyama
        text: "明るく、熱くなく、長持ち。3つ同時は、地獄です。"
      - speaker: zundamon
        emotion: normal
        text: "でも、光がなければ何も写らないのだ。"
      - speaker: maruyama
        text: "分かってます。……もう1回、巻き直します。"
      - speaker: reimu
        text: "丸山は8か月、来る日も来る日も、電球を巻き続けました。"
        reading: "まるやまわはちかげつ、くるひもくるひも、でんきゅうをまきつづけました。"
      - speaker: maruyama
        text: "……できた。これなら、明るくて、熱くない。"
      - speaker: zundamon
        emotion: happy
        text: "ついに、胃を照らす光なのだ！"
      - speaker: tsumugi
