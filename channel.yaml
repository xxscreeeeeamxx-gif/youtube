# ==============================================================
# チャンネル設定 — ここを書き換えるだけでテーマ・キャラ・見た目を変更できる
# ==============================================================

channel:
  name: "日常研究所"
  theme: "身近な科学・雑学を、青山龍星が落ち着いた語りで解説する"
  # 台本生成時に目標とする本編の長さ（分）
  target_length_minutes: 9
  # 視聴者層のイメージ（台本プロンプトに渡る）
  audience: "通勤・寝る前にスマホで気軽に見る20〜40代。専門知識ゼロ前提。"

# 単独ナレーター構成。青山龍星が一人で最後まで語る。
# （tsumugi / zundamon は掛け合い形式の実験用。使ったプロジェクトだけクレジットに載る）
characters:
  aoyama:
    display_name: "青山龍星"
    credit: "VOICEVOX:青山龍星"
    # VOICEVOXのスタイルID（ノーマル=13）。`ytf voices` で一覧を確認できる
    voicevox_style: 13
    # 声はデフォルトのまま（スタイル切替・ピッチ・抑揚の調整なし）。話速だけ少し速く
    speed_scale: 1.15
    color: "#3AA0FF"  # 字幕・サムネで使う文字色
    role: "低音でよく喋る饒舌な解説役。畳みかけるリズムで視聴者に直接語りかけ、「〜していませんか？」「心当たりありますよね？」と軽く煽りながら引き込む。上から目線にはならず、ユーモアで中和する。"
    # 立ち絵は使わない構成なので sprite_dir / position は不要
  tsumugi:
    display_name: "春日部つむぎ"
    credit: "VOICEVOX:春日部つむぎ"
    voicevox_style: 8   # ノーマル固定（スタイル切替はしない: 聞き取りやすさ優先）
    speed_scale: 1.15
    color: "#F5A623"
    sprite_dir: assets/characters/tsumugi
    position: right
    role: "解説役の先生。明るいお姉さん口調でテンポよく核心を突く。生徒のずんだもんを軽くいじりつつ、最後は必ず分かりやすくまとめる。奇をてらった言い回しは使わず、誰でも分かる素直な表現で話す。"
  zundamon:
    display_name: "ずんだもん"
    credit: "VOICEVOX:ずんだもん"
    voicevox_style: 3   # ノーマル固定（スタイル切替はしない: 聞き取りやすさ優先）
    speed_scale: 1.15
    color: "#5AC85A"
    sprite_dir: assets/characters/zundamon
    position: left
    sprite_scale: 1.0    # つむぎと身長を揃える（同じ表示高さ）
    sprite_flip: true    # 素材が外向きなので反転して内側（つむぎ側）を向かせる
    role: "ちょっとアホな生徒役。語尾は必ず「〜なのだ」「〜のだ」。一人称はボク。視聴者と同じ勘違いをして驚き、質問し、突っ込まれる。"
  reimu:
    display_name: "れいむ"
    credit: "AquesTalkPlayer（株式会社アクエスト）"
    # ゆっくりボイス。VOICEVOXではなくAquesTalkPlayer(公式Mac版)のCLIで合成する
    engine: aquestalk
    aquestalk_preset: "れいむ"
    speed_scale: 1.3   # お手本準拠で速め。AquesTalkに話速パラメータはないのでffmpeg atempoで調整
    color: "#FF6B6B"
    role: "再現ドラマのナレーター。です・ます調で史実・数字・年号を淡々と補足し、ボケには乗らず、時々オチだけ静かに回収する。"

# ゆっくりボイス（AquesTalkPlayer 公式Mac版）。個人・非営利は無償。
# 再セットアップ: https://www.a-quest.com/products/aquestalkplayer.html のdmgを
# tools/AquesTalkPlayer.app に展開する（gitには含めない）
aquestalk:
  player_path: "tools/AquesTalkPlayer.app/Contents/MacOS/AquesTalkPlayer"

voicevox:
  url: "http://127.0.0.1:50021"
  # エンジンが落ちていたらここからヘッドレス自動起動（GUIアプリを開く必要なし）
  engine_path: "/Applications/VOICEVOX.app/Contents/Resources/vv-engine/run"
  # セリフ間の無音（秒）。台本側の pause_after で上書き可能
  default_pause: 0.45
  # 再現ドラマ(mode: drama)の間。短文ラリーの畳みかけ用に詰める
  drama_pause: 0.15
  # 再現ドラマで話者が交代する瞬間の間（会話の呼吸）
  drama_pause_switch: 0.3
  # 読み間違い対策のユーザー辞書（起動時に自動登録）
  dictionary:
    - { surface: "Wi-Fi", pronunciation: "ワイファイ", accent_type: 3 }
    - { surface: "生成AI", pronunciation: "セイセイエーアイ", accent_type: 5 }

video:
  width: 1920
  height: 1080
  fps: 30
  # 立ち絵: 出演キャラ全員に sprite_dir があるプロジェクトだけ自動で表示される
  # （aoyama単独回は sprite_dir が無いので従来どおり背景＋テロップ主体）
  show_characters: true
  # 画面の動き（1画像を1方向にゆっくり動かすKen Burns。シーン単位で連続）
  motion:
    enabled: true
    # シーン全体を通したズーム/パン量（18%）。1方向のみ・カットをまたいで連続。
    # 小さすぎると1フレームの移動がサブピクセル未満になりカクつくので、
    # 滑らかさを保てる下限として18%程度にしている。
    zoom: 0.18
  # auto: Macなら h264_videotoolbox、無ければ libx264
  encoder: auto
  crf: 20
  bgm:
    file: assets/bgm/haru_kitchen.mp3   # 春のキッチン（DOVA-SYNDROME・もっぴーさうんど）。他の曲は assets/bgm/SOURCES.md 参照
    volume_db: -24
    ducking: true       # セリフ中にBGMを自動で下げる
  # 効果音の音量（dB）。台本カットの se: で鳴らす（控えめ運用）
  se_volume_db: -8
  # チャンネルOP（導入シーンの直後に挿入される5秒のオープニング）
  op:
    enabled: true
    file: assets/op.mp4   # ytf op で生成
  # 章の切替トランジション（全画面の章タイトル）
  transition:
    enabled: true
    lead: 1.8           # トランジションの表示秒＝章頭に入れる無音の間。長くするほどじっくり
    se: trans           # トランジションで鳴らす効果音（assets/se/の名前）
  loudnorm: true        # -14 LUFS に正規化

subtitles:
  # テロップ（字幕焼き込み）のオン/オフ。false でも out/subs.ass は生成される
  enabled: false
  # ASS字幕用フォント名（libassがfontconfigで解決する名前）
  font: "Hiragino Sans"
  font_fallbacks: ["Noto Sans CJK JP", "Noto Sans JP"]
  font_size: 60
  outline: 3
  margin_v: 42

# Pillow描画（見出し・スライド・サムネ）用フォントファイルの探索順
fonts:
  paths:
    - "/System/Library/Fonts/ヒラギノ角ゴシック W6.ttc"
    - "/System/Library/Fonts/Hiragino Sans GB.ttc"
    - "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc"
    - "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"

llm:
  # manual: プロンプトを書き出して claude.ai 等に人間がコピペする（API不使用・無料）
  # auto にすると ANTHROPIC_API_KEY がある場合だけAPIを使う
  mode: manual
  model: "claude-opus-4-8"

shorts:
  width: 1080
  height: 1920
  # ショート化するシーンは台本側で short: true を付ける

metadata:
  description_template: |
    {summary}

    ▼ 目次
    {chapters}

    ▼ クレジット
    {credits}

    ※ 本動画は VOICEVOX の音声合成を使用しています。
  tags_base: ["解説", "雑学", "science", "青山龍星", "VOICEVOX"]
