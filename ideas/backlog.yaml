ideas:
- id: ice-slippery
  title: "【誰も知らない】氷が滑る理由、実はまだ解明されていない"
  hook: "毎日見ている氷。なぜ滑るのか、科学はまだ答えを出せていません。"
  angle: "圧力融解説の崩壊→摩擦熱＋疑似液体層→最新研究でも未決着、という科学ミステリー仕立て"
  score: 5
  status: used
- id: freeze-hot-water
  title: "お湯は水より早く凍る？物理学者を悩ませ続ける現象"
  hook: "冷たい水と熱いお湯、同時に凍らせると勝つのはまさかの…"
  angle: "ムペンバ効果。高校生の発見が学界を動かした逸話と、いまだ論争中という結末"
  score: 5
  status: new
- id: microwave-heat
  title: "電子レンジはなぜ『食べ物だけ』温まるのか"
  hook: "お皿は冷たいのに中身はアツアツ。この差、説明できますか？"
  angle: "水分子が電波に合わせて揺さぶられる仕組みを『満員電車の身動き』に例える。ラップの意味も回収"
  score: 5
  status: new
- id: plane-window
  title: "飛行機の窓が丸いのは、四角い窓で墜落したから"
  hook: "昔の飛行機の窓は四角でした。丸くなったのには血の教訓があります。"
  angle: "コメット連続墜落事故→金属疲労と応力集中を『下敷きの角の裂け目』で説明"
  score: 5
  status: new
- id: cicada-prime
  title: "セミが17年も土の中にいる理由が天才すぎた"
  hook: "13年と17年。素数の年にだけ大量発生するセミがいます。偶然ではありません。"
  angle: "素数ゼミ。天敵と周期が重ならない数学的戦略を最小公倍数で解説"
  score: 4
  status: new
- id: moon-follow
  title: "月はなぜどこまでも『ついてくる』のか"
  hook: "車で走っても月だけはずっと隣にいる。子供の頃の疑問に科学で答えます。"
  angle: "遠すぎて視差がほぼゼロになる仕組み。電柱と月の流れる速さの違いで体感的に説明"
  score: 4
  status: new
- id: kettle-quiet
  title: "やかんは沸騰する直前、一瞬静かになる"
  hook: "お湯を沸かす音、実は沸騰の直前にスッと静かになるのを知っていますか？"
  angle: "泡の発生と消滅（キャビテーション音）。音の正体を追いながら沸騰の物理を解説"
  score: 3
  status: new
- id: banana-slip
  title: "『バナナの皮で転ぶ』を大真面目に研究した日本人がいた"
  hook: "摩擦係数0.07。バナナの皮は本当に氷なみに滑ることが実験で証明されています。"
  angle: "イグノーベル賞（馬渕教授）の実話。ギャグ研究から靴底や人工関節への応用まで"
  score: 4
  status: new
- id: cat-fall
  title: "猫が高所から落ちても平気な理由は物理的にヤバい"
  hook: "高層階から落ちた猫の生存率、実は『高いほうが上がる』という統計があります。"
  angle: "空中で体をひねる角運動量の話と終端速度。『猫ひねり』はNASAも研究した"
  score: 4
  status: new
- id: five-yen-hole
  title: "5円玉に穴が空いている本当の理由"
  hook: "デザインではありません。あの穴は日本の黒歴史と節約の産物です。"
  angle: "戦後インフレ・偽造防止・材料節約の歴史雑学。世界の穴あき硬貨事情も"
  score: 3
  status: new
- id: train-sleepy
  title: "電車に乗ると眠くなるのは科学的に当然だった"
  hook: "家のベッドより電車のほうが眠い。あれには複数の理由が重なっています。"
  angle: "1/fゆらぎ・単調な振動・軽い酸欠気味の車内。赤ちゃんの寝かしつけとの共通点"
  score: 4
  status: new
- id: candle-space
  title: "無重力でロウソクに火をつけると炎が丸くなる"
  hook: "あの炎の形、実は重力が作っていました。宇宙では想像と違う姿になります。"
  angle: "対流の仕組みから。NASAの宇宙実験映像の話→火災対策への応用"
  score: 3
  status: new
- id: mosquito-rain
  title: "蚊は自分の50倍の雨粒に当たっても死なない"
  hook: "人間なら車に轢かれる衝撃。でも蚊は雨の中を平気で飛んでいます。"
  angle: "軽すぎて雨粒と一緒に落ちてから離脱する高速カメラ研究。小ささは武器という話"
  score: 3
  status: new
- id: rainbow-seven
  title: "虹が7色なのは日本だけ？国によって色の数が違う理由"
  hook: "アメリカでは6色、昔の日本では5色。虹の色数は科学ではなく文化で決まっています。"
  angle: "連続スペクトルを言葉で区切っているだけ、という認知の話。ニュートンが7にした理由"
  score: 4
  status: new
- id: shampoo-bump
  title: "シャンプーボトルのギザギザ、誰のためにあるか知ってますか"
  hook: "毎日触っているのに9割の人が気づかない、あの突起の正体。"
  angle: "目を閉じてもリンスと区別できるユニバーサルデザイン。日本発で世界標準になった話"
  score: 3
  status: new
- id: escalator-side
  title: "エスカレーターの片側空け、実は全員が損している"
  hook: "急ぐ人のための片側空け。数学的には全員が遅くなっています。"
  angle: "輸送量のシミュレーション研究（ロンドン地下鉄の実験）。常識を数字でひっくり返す"
  score: 4
  status: new
